syntax = "proto3";

option csharp_namespace = "Urfu.Link.Services.Notification.Grpc";
package notification.internal.v1;

service InternalApi {
  rpc Ping (PingRequest) returns (PingReply);
  rpc SendDirectNotification (SendDirectNotificationRequest) returns (SendDirectNotificationReply);
  rpc GetBadgeCount (GetBadgeCountRequest) returns (GetBadgeCountReply);
}

message PingRequest {
  string message = 1;
}

message PingReply {
  string message = 1;
  string service = 2;
  string utc = 3;
}

message SendDirectNotificationRequest {
  string user_id = 1;
  int32 category = 2;
  int32 severity = 3;
  string title = 4;
  string body = 5;
  string deep_link = 6;
  map<string, string> data = 7;
  string source_id = 8;
  string source_event_type = 9;
}

message SendDirectNotificationReply {
  string notification_id = 1;
  bool created = 2;
}

message GetBadgeCountRequest {
  string user_id = 1;
}

message GetBadgeCountReply {
  int32 total = 1;
  map<int32, int32> per_category = 2;
}

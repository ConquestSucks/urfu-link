<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Deadline approaching</title></head>
<body style="font-family:Arial,sans-serif;background:#f5f5f7;padding:24px">
  <table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;padding:24px">
    <tr><td>
      <h1 style="color:#003566;margin-top:0">Deadline approaching: {{title}}</h1>
      <p style="color:#222;font-size:15px;line-height:1.5">{{body}}</p>
      <p style="margin-top:16px"><a href="{{deepLink}}" style="background:#003566;color:#fff;padding:10px 18px;text-decoration:none;border-radius:4px">Open</a></p>
      <hr style="border:none;border-top:1px solid #eee;margin:24px 0">
      <p style="font-size:12px;color:#888">UrFU Link · Deadline approaching</p>
    </td></tr>
  </table>
</body></html>

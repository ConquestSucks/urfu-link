syntax = "proto3";

option csharp_namespace = "Urfu.Link.Services.Presence.Grpc";
package presence.internal.v1;

service InternalApi {
  rpc Ping(PingRequest) returns (PingReply);
  rpc GetPresence(GetPresenceRequest) returns (PresenceInfo);
  rpc GetPresenceBatch(GetPresenceBatchRequest) returns (GetPresenceBatchReply);
  rpc IsOnline(IsOnlineRequest) returns (IsOnlineReply);
  rpc IsTyping(IsTypingRequest) returns (IsTypingReply);
}

message PingRequest {
  string message = 1;
}

message PingReply {
  string message = 1;
  string service = 2;
  string utc = 3;
}

// Mirrors Domain.Enums.PresenceStatus by ordinal value.
enum PresenceStatus {
  PRESENCE_STATUS_ONLINE = 0;
  PRESENCE_STATUS_AWAY = 1;
  PRESENCE_STATUS_DO_NOT_DISTURB = 2;
  PRESENCE_STATUS_INVISIBLE = 3;
  PRESENCE_STATUS_OFFLINE = 4;
}

// Mirrors Domain.Enums.Platform by ordinal value.
enum Platform {
  PLATFORM_MOBILE = 0;
  PLATFORM_WEB = 1;
  PLATFORM_DESKTOP = 2;
}

message PresenceInfo {
  string user_id = 1;
  PresenceStatus status = 2;
  repeated Platform platforms = 3;
  // ISO8601 UTC string; empty when no last_seen is known.
  string last_seen_at_utc = 4;
}

message GetPresenceRequest {
  string user_id = 1;
}

message GetPresenceBatchRequest {
  repeated string user_ids = 1;
}

message GetPresenceBatchReply {
  repeated PresenceInfo items = 1;
}

message IsOnlineRequest {
  string user_id = 1;
}

message IsOnlineReply {
  bool is_online = 1;
}

message IsTypingRequest {
  string conversation_id = 1;
  string user_id = 2;
}

message IsTypingReply {
  bool is_typing = 1;
}

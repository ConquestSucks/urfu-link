syntax = "proto3";

option csharp_namespace = "Urfu.Link.Services.Disciplines.Grpc";
package discipline.internal.v1;

service InternalApi {
  rpc Ping (PingRequest) returns (PingReply);
  rpc CheckMembership (CheckMembershipRequest) returns (CheckMembershipReply);
  rpc ListMembers (ListMembersRequest) returns (ListMembersReply);
  rpc ListUserDisciplines (ListUserDisciplinesRequest) returns (ListUserDisciplinesReply);
  rpc ListDisciplineSnapshots (ListDisciplineSnapshotsRequest) returns (ListDisciplineSnapshotsReply);
  rpc GetDiscipline (GetDisciplineRequest) returns (GetDisciplineReply);
}

message PingRequest {
  string message = 1;
}

message PingReply {
  string message = 1;
  string service = 2;
  string utc = 3;
}

enum MembershipRole {
  MEMBERSHIP_ROLE_UNKNOWN = 0;
  MEMBERSHIP_ROLE_TEACHER = 1;
  MEMBERSHIP_ROLE_STUDENT = 2;
}

message CheckMembershipRequest {
  string discipline_id = 1;
  string user_id = 2;
}

message CheckMembershipReply {
  bool is_member = 1;
  MembershipRole role = 2;
}

message MemberInfo {
  string user_id = 1;
  MembershipRole role = 2;
  string enrolled_at_utc = 3;
  string subgroup_id = 4;
}

message ListMembersRequest {
  string discipline_id = 1;
}

message ListMembersReply {
  bool exists = 1;
  repeated MemberInfo members = 2;
}

message UserDisciplineInfo {
  string discipline_id = 1;
  string code = 2;
  string title = 3;
  MembershipRole role = 4;
  string subgroup_id = 5;
  repeated string visible_subgroup_ids = 6;
}

message ListUserDisciplinesRequest {
  string user_id = 1;
}

message ListUserDisciplinesReply {
  repeated UserDisciplineInfo disciplines = 1;
}

message DisciplineSubgroupSnapshotInfo {
  string subgroup_id = 1;
  string name = 2;
  string created_at_utc = 3;
  string updated_at_utc = 4;
  string archived_at_utc = 5;
  bool is_archived = 6;
}

message DisciplineSnapshotInfo {
  string discipline_id = 1;
  string code = 2;
  string title = 3;
  string semester = 4;
  string owner_teacher_id = 5;
  string cover_asset_id = 6;
  string created_at_utc = 7;
  string updated_at_utc = 8;
  string archived_at_utc = 9;
  bool is_archived = 10;
  repeated DisciplineSubgroupSnapshotInfo subgroups = 11;
  repeated MemberInfo members = 12;
}

message ListDisciplineSnapshotsRequest {
  bool include_archived = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListDisciplineSnapshotsReply {
  repeated DisciplineSnapshotInfo disciplines = 1;
  string next_page_token = 2;
}

message GetDisciplineRequest {
  string discipline_id = 1;
}

message GetDisciplineReply {
  bool exists = 1;
  string discipline_id = 2;
  string code = 3;
  string title = 4;
  string owner_teacher_id = 5;
  string cover_asset_id = 6;
  bool is_archived = 7;
}

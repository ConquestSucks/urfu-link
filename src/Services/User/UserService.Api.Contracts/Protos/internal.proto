syntax = "proto3";

option csharp_namespace = "Urfu.Link.Services.User.Grpc";
package user.internal.v1;

service InternalApi {
  rpc Ping (PingRequest) returns (PingReply);
  rpc GetNotificationPreferences (GetNotificationPreferencesRequest) returns (GetNotificationPreferencesReply);
  rpc UpdateNotificationPreferences (UpdateNotificationPreferencesRequest) returns (UpdateNotificationPreferencesReply);
  rpc GetUserContact (GetUserContactRequest) returns (GetUserContactReply);
  rpc BatchGetUsers (BatchGetUsersRequest) returns (BatchGetUsersReply);
}

message PingRequest {
  string message = 1;
}

message PingReply {
  string message = 1;
  string service = 2;
  string utc = 3;
}

message ChannelToggle {
  bool push = 1;
  bool email = 2;
  bool in_app = 3;
}

message CategoryToggle {
  int32 category = 1;
  ChannelToggle toggle = 2;
}

message QuietHours {
  string iana_timezone = 1;
  string start = 2; // "HH:mm" or empty when not enabled
  string end = 3;
  bool enabled = 4;
}

message NotificationPreferencesPayload {
  repeated CategoryToggle categories = 1;
  QuietHours quiet_hours = 2;
  bool dnd_enabled = 3;
  string locale = 4;
  bool sound = 5;
  repeated string muted_conversation_ids = 6;
}

message GetNotificationPreferencesRequest {
  string user_id = 1;
}

message GetNotificationPreferencesReply {
  NotificationPreferencesPayload preferences = 1;
}

message UpdateNotificationPreferencesRequest {
  string user_id = 1;
  NotificationPreferencesPayload preferences = 2;
}

message UpdateNotificationPreferencesReply {
  NotificationPreferencesPayload preferences = 1;
}

message GetUserContactRequest {
  string user_id = 1;
}

message GetUserContactReply {
  string email = 1;
  string display_name = 2;
  string locale = 3;
}

message BatchGetUsersRequest {
  repeated string user_ids = 1;
}

message UserSummary {
  string user_id = 1;
  string display_name = 2;
  string avatar_url = 3;
  string email = 4;
}

message BatchGetUsersReply {
  repeated UserSummary users = 1;
}

packages:
  - apps/*
  - packages/*

# pnpm 10+ blocks postinstall scripts of transitive deps by default (supply-chain
# hardening). esbuild — fetches a platform-specific native binary in its
# postinstall; msgpackr-extract — нужен Metro/SignalR на mobile.
allowBuilds:
  esbuild: true
  msgpackr-extract: true

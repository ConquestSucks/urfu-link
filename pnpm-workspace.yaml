packages:
  - apps/*
  - packages/*

# pnpm 10+ blocks postinstall scripts of transitive deps by default.
# esbuild fetches a native binary; msgpackr-extract is needed by Metro/SignalR.
# msw runs its package setup script.
allowBuilds:
  esbuild: true
  msgpackr-extract: true
  msw: true

patchedDependencies:
  rn-emoji-keyboard@1.7.0: patches/rn-emoji-keyboard@1.7.0.patch

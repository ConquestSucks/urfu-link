packages:
  - apps/*
  - packages/*

allowBuilds:
  esbuild: true

# pnpm 10+ blocks postinstall scripts of transitive deps by default (supply-chain
# hardening). List packages here that legitimately need to run a build step.
# esbuild fetches a platform-specific native binary in its postinstall.
onlyBuiltDependencies:
  - esbuild

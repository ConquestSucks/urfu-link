name: Promote App

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to promote
        required: true
        type: choice
        options:
          - api-gateway
          - media-service
          - user-service
          - chat-service
          - presence-service
          - notification-service
          - call-service
          - frontend-web
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: Image tag to pin in Helm values
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.environment == 'prod' && 'master' || 'develop' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists
        env:
          SERVICE: ${{ inputs.service }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          IMAGE="ghcr.io/conquestsucks/urfu-link/${SERVICE}:${IMAGE_TAG}"
          echo "Checking ${IMAGE}..."
          docker manifest inspect "${IMAGE}" > /dev/null 2>&1 || \
            (echo "::error::Image ${IMAGE} not found in registry" && exit 1)
          echo "Image verified."

      - name: Promote ${{ inputs.service }} to ${{ inputs.environment }}
        uses: ./.github/actions/promote
        with:
          service: ${{ inputs.service }}
          environment: ${{ inputs.environment }}
          image_tag: ${{ inputs.image_tag }}
          base_branch: ${{ inputs.environment == 'prod' && 'master' || 'develop' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

name: Frontend Mobile Update

on:
  workflow_dispatch:
    inputs:
      branch:
        description: EAS Update branch
        required: true
        type: choice
        options:
          - preview
          - staging
          - production
      message:
        description: Update message
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.18.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Resolve release env
        shell: bash
        run: |
          if [ "${{ inputs.branch }}" = "production" ]; then
            echo "APP_ENV=prod" >> "$GITHUB_ENV"
            echo "EXPO_PUBLIC_API_URL=https://api.ghjc.ru" >> "$GITHUB_ENV"
          else
            echo "APP_ENV=dev" >> "$GITHUB_ENV"
            echo "EXPO_PUBLIC_API_URL=https://api.dev.127.0.0.1.nip.io" >> "$GITHUB_ENV"
          fi
      - run: pnpm --filter @urfu-link/client exec eas update --branch ${{ inputs.branch }} --message "${{ inputs.message }}" --platform all --non-interactive
        env:
          EXPO_EAS_PROJECT_ID: ${{ secrets.EXPO_EAS_PROJECT_ID }}
          EXPO_OWNER: ${{ vars.EXPO_OWNER }}

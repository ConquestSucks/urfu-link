name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Build all service images regardless of changes"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.103

      - name: Restore
        run: dotnet restore Urfu.Link.slnx

      - name: Build
        run: dotnet build Urfu.Link.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Urfu.Link.slnx -c Release --no-build

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint shared chart
        run: helm lint deploy/helm/charts/urfu-service

      - name: Render manifests for all environments
        shell: bash
        run: |
          set -euo pipefail
          services=(
            api-gateway
            media-service
            user-service
            chat-service
            presence-service
            notification-service
            call-service
            frontend-web
          )
          for service in "${services[@]}"; do
            helm template "$service" deploy/helm/charts/urfu-service -f "deploy/helm/services/$service/values-dev.yaml" > /tmp/"$service"-dev.yaml
            helm template "$service" deploy/helm/charts/urfu-service -f "deploy/helm/services/$service/values-prod.yaml" > /tmp/"$service"-prod.yaml
          done

  detect-changes:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      any_changed: ${{ steps.build-matrix.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        if: inputs.force_all != true
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'src/BuildingBlocks/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'NuGet.Config'
            api-gateway:
              - 'src/Gateway/ApiGateway/**'
            media-service:
              - 'src/Services/Media/**'
            user-service:
              - 'src/Services/User/**'
            chat-service:
              - 'src/Services/Chat/**'
            presence-service:
              - 'src/Services/Presence/**'
            notification-service:
              - 'src/Services/Notification/**'
            call-service:
              - 'src/Services/Call/**'

      - name: Build service matrix
        id: build-matrix
        shell: bash
        run: |
          declare -A SERVICE_MAP
          SERVICE_MAP[api-gateway]="src/Gateway/ApiGateway/Dockerfile"
          SERVICE_MAP[media-service]="src/Services/Media/MediaService.Api/Dockerfile"
          SERVICE_MAP[user-service]="src/Services/User/UserService.Api/Dockerfile"
          SERVICE_MAP[chat-service]="src/Services/Chat/ChatService.Api/Dockerfile"
          SERVICE_MAP[presence-service]="src/Services/Presence/PresenceService.Api/Dockerfile"
          SERVICE_MAP[notification-service]="src/Services/Notification/NotificationService.Api/Dockerfile"
          SERVICE_MAP[call-service]="src/Services/Call/CallService.Api/Dockerfile"

          ALL_SERVICES=(api-gateway media-service user-service chat-service presence-service notification-service call-service)

          FORCE_ALL="${{ inputs.force_all }}"
          SHARED_CHANGED="${{ steps.filter.outputs.shared }}"

          includes="[]"

          if [[ "$FORCE_ALL" == "true" || "$SHARED_CHANGED" == "true" ]]; then
            includes=$(jq -n '[
              {"service":"api-gateway","dockerfile":"src/Gateway/ApiGateway/Dockerfile","context":"."},
              {"service":"media-service","dockerfile":"src/Services/Media/MediaService.Api/Dockerfile","context":"."},
              {"service":"user-service","dockerfile":"src/Services/User/UserService.Api/Dockerfile","context":"."},
              {"service":"chat-service","dockerfile":"src/Services/Chat/ChatService.Api/Dockerfile","context":"."},
              {"service":"presence-service","dockerfile":"src/Services/Presence/PresenceService.Api/Dockerfile","context":"."},
              {"service":"notification-service","dockerfile":"src/Services/Notification/NotificationService.Api/Dockerfile","context":"."},
              {"service":"call-service","dockerfile":"src/Services/Call/CallService.Api/Dockerfile","context":"."}
            ]')
          else
            includes="[]"
            for svc in "${ALL_SERVICES[@]}"; do
              changed="${{ steps.filter.outputs.changes }}"
              # Check individual service filter output
              svc_changed=""
              case "$svc" in
                api-gateway) svc_changed="${{ steps.filter.outputs.api-gateway }}" ;;
                media-service) svc_changed="${{ steps.filter.outputs.media-service }}" ;;
                user-service) svc_changed="${{ steps.filter.outputs.user-service }}" ;;
                chat-service) svc_changed="${{ steps.filter.outputs.chat-service }}" ;;
                presence-service) svc_changed="${{ steps.filter.outputs.presence-service }}" ;;
                notification-service) svc_changed="${{ steps.filter.outputs.notification-service }}" ;;
                call-service) svc_changed="${{ steps.filter.outputs.call-service }}" ;;
              esac

              if [[ "$svc_changed" == "true" ]]; then
                dockerfile="${SERVICE_MAP[$svc]}"
                includes=$(echo "$includes" | jq --arg s "$svc" --arg d "$dockerfile" '. + [{"service":$s,"dockerfile":$d,"context":"."}]')
              fi
            done
          fi

          count=$(echo "$includes" | jq 'length')
          if [[ "$count" -gt 0 ]]; then
            matrix=$(jq -nc --argjson inc "$includes" '{"include":$inc}')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    if: github.event_name != 'pull_request' && needs.detect-changes.outputs.any_changed == 'true'
    needs: [build-test, helm-validate, detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/urfu-link/${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=stable,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/urfu-link/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign image
        env:
          COSIGN_YES: "true"
        run: cosign sign "ghcr.io/${{ github.repository_owner }}/urfu-link/${{ matrix.service }}@${{ steps.build.outputs.digest }}"

      - name: Export image digest
        shell: bash
        run: |
          mkdir -p dist/digests
          echo "${{ steps.build.outputs.digest }}" > "dist/digests/${{ matrix.service }}.txt"

      - name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: image-digests-${{ matrix.service }}
          path: dist/digests/${{ matrix.service }}.txt

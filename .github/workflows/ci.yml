name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Build all service images regardless of changes"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  build-test:
    if: github.head_ref != 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.103

      - name: Restore
        run: dotnet restore Urfu.Link.slnx

      - name: Build
        run: dotnet build Urfu.Link.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Urfu.Link.slnx -c Release --no-build

  helm-validate:
    if: github.head_ref != 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Lint shared chart
        run: helm lint deploy/helm/charts/urfu-service

      - name: Render manifests for all environments
        shell: bash
        run: |
          set -euo pipefail
          services=(
            api-gateway
            media-service
            user-service
            chat-service
            discipline-service
            presence-service
            notification-service
            call-service
            frontend-web
          )
          for service in "${services[@]}"; do
            helm template "$service" deploy/helm/charts/urfu-service -f "deploy/helm/services/$service/values-dev.yaml" > /tmp/"$service"-dev.yaml
            helm template "$service" deploy/helm/charts/urfu-service -f "deploy/helm/services/$service/values-prod.yaml" > /tmp/"$service"-prod.yaml
          done

  detect-changes:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      any_changed: ${{ steps.build-matrix.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        if: inputs.force_all != true
        id: filter
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.event.before }}
          filters: |
            shared:
              - 'src/BuildingBlocks/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'NuGet.Config'
              - 'platform/dev/Dockerfile.service'
            api-gateway:
              - 'src/Gateway/ApiGateway/**'
            media-service:
              - 'src/Services/Media/**'
            user-service:
              - 'src/Services/User/**'
            chat-service:
              - 'src/Services/Chat/**'
            discipline-service:
              - 'src/Services/Discipline/**'
            presence-service:
              - 'src/Services/Presence/**'
            notification-service:
              - 'src/Services/Notification/**'
            call-service:
              - 'src/Services/Call/**'

      - name: Build service matrix
        id: build-matrix
        shell: bash
        run: |
          # service → (project_path, dll_name) для build-args единого Dockerfile.
          declare -A PROJECT_MAP
          PROJECT_MAP[api-gateway]="src/Gateway/ApiGateway/ApiGateway.csproj"
          PROJECT_MAP[media-service]="src/Services/Media/MediaService.Api/MediaService.Api.csproj"
          PROJECT_MAP[user-service]="src/Services/User/UserService.Api/UserService.Api.csproj"
          PROJECT_MAP[chat-service]="src/Services/Chat/ChatService.Api/ChatService.Api.csproj"
          PROJECT_MAP[discipline-service]="src/Services/Discipline/DisciplineService.Api/DisciplineService.Api.csproj"
          PROJECT_MAP[presence-service]="src/Services/Presence/PresenceService.Api/PresenceService.Api.csproj"
          PROJECT_MAP[notification-service]="src/Services/Notification/NotificationService.Api/NotificationService.Api.csproj"
          PROJECT_MAP[call-service]="src/Services/Call/CallService.Api/CallService.Api.csproj"

          declare -A DLL_MAP
          DLL_MAP[api-gateway]="ApiGateway.dll"
          DLL_MAP[media-service]="MediaService.Api.dll"
          DLL_MAP[user-service]="UserService.Api.dll"
          DLL_MAP[chat-service]="ChatService.Api.dll"
          DLL_MAP[discipline-service]="DisciplineService.Api.dll"
          DLL_MAP[presence-service]="PresenceService.Api.dll"
          DLL_MAP[notification-service]="NotificationService.Api.dll"
          DLL_MAP[call-service]="CallService.Api.dll"

          ALL_SERVICES=(api-gateway media-service user-service chat-service discipline-service presence-service notification-service call-service)

          FORCE_ALL="${{ inputs.force_all }}"
          SHARED_CHANGED="${{ steps.filter.outputs.shared }}"
          DOCKERFILE="platform/dev/Dockerfile.service"

          add_service() {
            local svc="$1"
            local proj="${PROJECT_MAP[$svc]}"
            local dll="${DLL_MAP[$svc]}"
            includes=$(echo "$includes" | jq \
              --arg s "$svc" \
              --arg d "$DOCKERFILE" \
              --arg p "$proj" \
              --arg n "$dll" \
              '. + [{"service":$s,"dockerfile":$d,"context":".","service_project":$p,"service_dll":$n}]')
          }

          includes="[]"

          if [[ "$FORCE_ALL" == "true" || "$SHARED_CHANGED" == "true" ]]; then
            for svc in "${ALL_SERVICES[@]}"; do
              add_service "$svc"
            done
          else
            for svc in "${ALL_SERVICES[@]}"; do
              svc_changed=""
              case "$svc" in
                api-gateway) svc_changed="${{ steps.filter.outputs.api-gateway }}" ;;
                media-service) svc_changed="${{ steps.filter.outputs.media-service }}" ;;
                user-service) svc_changed="${{ steps.filter.outputs.user-service }}" ;;
                chat-service) svc_changed="${{ steps.filter.outputs.chat-service }}" ;;
                discipline-service) svc_changed="${{ steps.filter.outputs.discipline-service }}" ;;
                presence-service) svc_changed="${{ steps.filter.outputs.presence-service }}" ;;
                notification-service) svc_changed="${{ steps.filter.outputs.notification-service }}" ;;
                call-service) svc_changed="${{ steps.filter.outputs.call-service }}" ;;
              esac

              if [[ "$svc_changed" == "true" ]]; then
                add_service "$svc"
              fi
            done
          fi

          count=$(echo "$includes" | jq 'length')
          if [[ "$count" -gt 0 ]]; then
            matrix=$(jq -nc --argjson inc "$includes" '{"include":$inc}')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    if: github.event_name != 'pull_request' && needs.detect-changes.outputs.any_changed == 'true'
    needs: [build-test, helm-validate, detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/urfu-link/${{ matrix.service }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=stable,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: |
            SERVICE_PROJECT=${{ matrix.service_project }}
            SERVICE_DLL=${{ matrix.service_dll }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Export image digest
        shell: bash
        run: |
          mkdir -p dist/digests
          echo "${{ steps.build.outputs.digest }}" > "dist/digests/${{ matrix.service }}.txt"

      - name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: image-digests-${{ matrix.service }}
          path: dist/digests/${{ matrix.service }}.txt

  promote-prod:
    if: github.event_name != 'pull_request' && needs.detect-changes.outputs.any_changed == 'true'
    needs: [build-images, detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Promote ${{ matrix.service }} to prod
        uses: ./.github/actions/promote
        with:
          service: ${{ matrix.service }}
          environment: prod
          image_tag: ${{ steps.tag.outputs.value }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

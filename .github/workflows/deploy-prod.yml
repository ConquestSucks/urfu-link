name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Argo CD application to sync"
        required: true
        default: "api-gateway-prod"
      image_tag:
        description: "Immutable image tag to deploy, for example sha-<commit>"
        required: false
        default: ""
      image_digest:
        description: "Optional image digest to deploy"
        required: false
        default: ""
      revision:
        description: "Git revision for sync"
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  argocd-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Login Argo CD
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd login "$ARGOCD_SERVER" --grpc-web --insecure --auth-token "$ARGOCD_AUTH_TOKEN"

      - name: Sync application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            argocd app set "${{ inputs.app }}" --helm-set-string image.tag="${{ inputs.image_tag }}" --grpc-web
          fi
          if [ -n "${{ inputs.image_digest }}" ]; then
            argocd app set "${{ inputs.app }}" --helm-set-string image.digest="${{ inputs.image_digest }}" --grpc-web
          fi
          argocd app set "${{ inputs.app }}" --revision "${{ inputs.revision }}" --grpc-web
          argocd app sync "${{ inputs.app }}" --grpc-web
          argocd app wait "${{ inputs.app }}" --health --timeout 600 --grpc-web

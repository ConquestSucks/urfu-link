name: Frontend Web Image

on:
  push:
    branches:
      - master
    paths:
      - "apps/client/**"
      - "packages/api-client/**"
      - "packages/ui/**"
      - "package.json"
      - ".npmrc"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.18.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm client:web:build
      - uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: horexdev
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Resolve image metadata
        shell: bash
        run: |
          echo "IMAGE_NAME=ghcr.io/horexdev/urfu-link/frontend-web" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/client/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:master

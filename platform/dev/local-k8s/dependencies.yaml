apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: urfu-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: apache/kafka:4.0.1
          env:
            - name: CLUSTER_ID
              value: MkU3OEVBNTcwNTJENDM2Qk
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka.urfu-platform.svc.cluster.local:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka.urfu-platform.svc.cluster.local:9093
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: controller
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: urfu-platform
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: controller
      port: 9093
      targetPort: controller
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-bootstrap
  namespace: urfu-platform
spec:
  backoffLimit: 6
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: kafka-bootstrap
          image: apache/kafka:4.0.1
          command:
            - sh
            - -c
            - |
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka.urfu-platform.svc.cluster.local:9092 --list >/dev/null 2>&1; do
                sleep 2
              done

              topics="urfu.user.events.v1 urfu.media.events.v1 urfu.chat.events.v1 urfu.presence.events.v1 urfu.notification.events.v1 urfu.call.events.v1 urfu.user.events.v1.dlq urfu.media.events.v1.dlq urfu.chat.events.v1.dlq urfu.presence.events.v1.dlq urfu.notification.events.v1.dlq urfu.call.events.v1.dlq"
              for topic in $topics; do
                /opt/kafka/bin/kafka-topics.sh \
                  --bootstrap-server kafka.urfu-platform.svc.cluster.local:9092 \
                  --create \
                  --if-not-exists \
                  --topic "$topic" \
                  --partitions 1 \
                  --replication-factor 1
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: urfu-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      enableServiceLinks: false
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-01-20T14-49-07Z
          args: ["server", "/data", "--console-address", ":9001"]

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-local
  namespace: urfu-dev
spec:
  ingressClassName: nginx
  rules:
    - host: api.dev.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

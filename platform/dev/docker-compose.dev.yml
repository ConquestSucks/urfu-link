name: urfu-link-dev

services:

  # ── Data stores ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:17.9
    container_name: urfu-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urfu
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:8.0.5
    container_name: urfu-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7.4.2
    container_name: urfu-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Messaging ──────────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.9.0
    container_name: urfu-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Two listeners: EXTERNAL for host apps (localhost:9092), INTERNAL for containers (kafka:29092)
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@urfu-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: urfu-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic urfu.user.events.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic urfu.chat.events.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic urfu.media.events.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic urfu.presence.events.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic urfu.notification.events.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic urfu.call.events.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic urfu.discipline.events.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic urfu.system.events.v1 --partitions 3 --replication-factor 1
        echo "Kafka topics created."
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: urfu-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: urfu-link-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8090:8080"

  # ── Object storage ─────────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: urfu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: urfu-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set minio http://minio:9000 minio minio123
        mc mb minio/user-avatars --ignore-existing
        mc anonymous set public minio/user-avatars
        mc mb minio/media-private --ignore-existing
        mc mb minio/media-public --ignore-existing
        mc anonymous set download minio/media-public
        echo "MinIO buckets ready."
    restart: "no"

  # ── Auth ───────────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.3
    container_name: urfu-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: urfu
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HTTP_PORT: "8080"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-urfu-link.json:/opt/keycloak/data/import/realm-urfu-link.json:ro
      - ../keycloak-theme:/opt/keycloak/themes/urfu-link:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <(head -1 <&3)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Observability ──────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: urfu-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  # ── WebRTC ─────────────────────────────────────────────────────────────────

  livekit:
    image: livekit/livekit-server:v1.9.12
    container_name: urfu-livekit
    command: ["--config", "/etc/livekit/livekit.yaml"]
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "60100-60150:60100-60150/udp"

  coturn:
    image: coturn/coturn:4.8.0-r0
    container_name: urfu-coturn
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"

  # ── .NET Services ──────────────────────────────────────────────────────────

  # ── Migration sidecars ─────────────────────────────────────────────────────
  # One-shot containers that mirror the production Helm pre-upgrade Job: run
  # `dotnet *.Api.dll --migrate` once, then exit. Main app pods depend on
  # `service_completed_successfully` so the schema is applied before anything
  # else opens a connection. This intentionally matches the prod flow — devs
  # should never see "auto-migrate on startup" behaviour locally either.

  user-migrations:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/User/UserService.Api/UserService.Api.csproj
        SERVICE_DLL: UserService.Api.dll
    container_name: urfu-user-migrations
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=user_db;Username=user;Password=user;GSS Encryption Mode=Disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  user-service:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/User/UserService.Api/UserService.Api.csproj
        SERVICE_DLL: UserService.Api.dll
    container_name: urfu-user-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=user_db;Username=user;Password=user;GSS Encryption Mode=Disable
      Kafka__BootstrapServers: kafka:29092
      Keycloak__ClientSecret: user-service-admin-dev-secret
      Auth__ValidIssuer: http://localhost:8080/realms/urfu-link
      Storage__PublicEndpoint: http://localhost:9000
      Infrastructure__Redis__Configuration: redis:6379
    depends_on:
      user-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  chat-service:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Chat/ChatService.Api/ChatService.Api.csproj
        SERVICE_DLL: ChatService.Api.dll
    container_name: urfu-chat-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kafka__BootstrapServers: kafka:29092
      Auth__ValidIssuer: http://localhost:8080/realms/urfu-link
      Infrastructure__Redis__Configuration: redis:6379
      # ServiceDefaults открывает H2C на :8081 во всех сервисах для gRPC.
      GrpcClients__InternalAuth__TokenEndpoint: http://keycloak:8080/realms/urfu-link/protocol/openid-connect/token
      GrpcClients__InternalAuth__ClientId: chat-service-internal
      GrpcClients__InternalAuth__ClientSecret: chat-service-internal-dev-secret
      GrpcClients__UserService__Address: http://user-service:8081
      GrpcClients__DisciplineService__Address: http://discipline-service:8081
      GrpcClients__MediaService__Address: http://media-service:8081
      GrpcClients__PresenceService__Address: http://presence-service:8081
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  media-migrations:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Media/MediaService.Api/MediaService.Api.csproj
        SERVICE_DLL: MediaService.Api.dll
    container_name: urfu-media-migrations
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=media_db;Username=media;Password=media;GSS Encryption Mode=Disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  media-service:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Media/MediaService.Api/MediaService.Api.csproj
        SERVICE_DLL: MediaService.Api.dll
    container_name: urfu-media-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kafka__BootstrapServers: kafka:29092
      Auth__ValidIssuer: http://localhost:8080/realms/urfu-link
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=media_db;Username=media;Password=media;GSS Encryption Mode=Disable
      Storage__Endpoint: http://minio:9000
      Storage__PublicEndpoint: http://localhost:9000
      Storage__AccessKey: minio
      Storage__SecretKey: minio123
      Storage__PrivateBucket: media-private
      Storage__PublicBucket: media-public
      Infrastructure__Redis__Configuration: redis:6379
    depends_on:
      media-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  presence-migrations:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Presence/PresenceService.Api/PresenceService.Api.csproj
        SERVICE_DLL: PresenceService.Api.dll
    container_name: urfu-presence-migrations
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=presence_db;Username=presence;Password=presence;GSS Encryption Mode=Disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  presence-service:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Presence/PresenceService.Api/PresenceService.Api.csproj
        SERVICE_DLL: PresenceService.Api.dll
    container_name: urfu-presence-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kafka__BootstrapServers: kafka:29092
      Kafka__ConsumerTopic: urfu.user.events.v1
      Kafka__ConsumerGroup: presence-privacy-projection-v1
      Auth__ValidIssuer: http://localhost:8080/realms/urfu-link
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=presence_db;Username=presence;Password=presence;GSS Encryption Mode=Disable
      Infrastructure__Redis__Configuration: redis:6379
    depends_on:
      presence-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  notification-migrations:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Notification/NotificationService.Api/NotificationService.Api.csproj
        SERVICE_DLL: NotificationService.Api.dll
    container_name: urfu-notification-migrations
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=notification_db;Username=notification;Password=notification;GSS Encryption Mode=Disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  notification-service:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Notification/NotificationService.Api/NotificationService.Api.csproj
        SERVICE_DLL: NotificationService.Api.dll
    container_name: urfu-notification-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kafka__BootstrapServers: kafka:29092
      Auth__ValidIssuer: http://localhost:8080/realms/urfu-link
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=notification_db;Username=notification;Password=notification;GSS Encryption Mode=Disable
      Infrastructure__Redis__Configuration: redis:6379
      Notification__Push__Provider: fake
      Notification__Smtp__Host: mailhog
      Notification__Smtp__Port: 1025
      Notification__Smtp__EnableStartTls: "false"
      Notification__Smtp__From: noreply@urfu-link.local
      Notification__Smtp__FromDisplayName: UrFU Link
      Notification__Retention__RetentionDays: "90"
      # ServiceDefaults открывает H2C на :8081 во всех сервисах для gRPC.
      UserService__GrpcEndpoint: http://user-service:8081
      PresenceService__GrpcEndpoint: http://presence-service:8081
    depends_on:
      notification-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: urfu-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  call-service:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Call/CallService.Api/CallService.Api.csproj
        SERVICE_DLL: CallService.Api.dll
    container_name: urfu-call-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kafka__BootstrapServers: kafka:29092
      Auth__ValidIssuer: http://localhost:8080/realms/urfu-link
      GrpcClients__ChatService__Address: http://chat-service:8081
      LiveKit__ServerUrl: ws://localhost:7880
      LiveKit__ApiKey: devkey
      LiveKit__ApiSecret: devsecret0123456789abcdef0123456789
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  discipline-migrations:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Discipline/DisciplineService.Api/DisciplineService.Api.csproj
        SERVICE_DLL: DisciplineService.Api.dll
    container_name: urfu-discipline-migrations
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=discipline_db;Username=discipline;Password=discipline;GSS Encryption Mode=Disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  discipline-service:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Services/Discipline/DisciplineService.Api/DisciplineService.Api.csproj
        SERVICE_DLL: DisciplineService.Api.dll
    container_name: urfu-discipline-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kafka__BootstrapServers: kafka:29092
      Auth__ValidIssuer: http://localhost:8080/realms/urfu-link
      ConnectionStrings__Primary: Host=postgres;Port=5432;Database=discipline_db;Username=discipline;Password=discipline;GSS Encryption Mode=Disable
      Infrastructure__Redis__Configuration: redis:6379
    depends_on:
      discipline-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api-gateway:
    build:
      context: ../..
      dockerfile: platform/dev/Dockerfile.service
      args:
        SERVICE_PROJECT: src/Gateway/ApiGateway/ApiGateway.csproj
        SERVICE_DLL: ApiGateway.dll
    container_name: urfu-api-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Cors__AllowedOrigins__0: http://localhost:3000
      Auth__ValidIssuer: http://localhost:8080/realms/urfu-link
      Infrastructure__Redis__Configuration: redis:6379
    ports:
      - "5080:8080"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      user-service:
        condition: service_started
      chat-service:
        condition: service_started
      media-service:
        condition: service_started
      presence-service:
        condition: service_started
      notification-service:
        condition: service_started
      call-service:
        condition: service_started
      discipline-service:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  minio-data:

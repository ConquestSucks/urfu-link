nameOverride: chat-service
fullnameOverride: chat-service
image:
  repository: urfu-link/chat-service
  pullPolicy: IfNotPresent
  tag: dev-local

replicaCount: 1

service:
  grpc:
    enabled: true

env:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://+:8080
  GrpcClients__InternalAuth__TokenEndpoint: http://keycloak.urfu-platform.svc.cluster.local:8080/realms/urfu-link/protocol/openid-connect/token
  GrpcClients__InternalAuth__ClientId: chat-service-internal
  GrpcClients__InternalAuth__ClientSecret: chat-service-internal-dev-secret
  GrpcClients__MediaService__Address: http://media-service:8081
  GrpcClients__DisciplineService__Address: http://discipline-service:8081
  GrpcClients__UserService__Address: http://user-service:8081
  GrpcClients__PresenceService__Address: http://presence-service:8081

secrets:
  enabled: true
  name: chat-service-secrets

rollout:
  enabled: false
  autoPromotionEnabled: true

autoscaling:
  enabled: false

serviceMonitor:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi


nameOverride: presence-service
fullnameOverride: presence-service
image:
  repository: ghcr.io/conquestsucks/urfu-link/presence-service
  pullPolicy: IfNotPresent
  tag: sha-b7ca7c5

imagePullSecrets:
  - name: ghcr-pull-secret

replicaCount: 1

service:
  grpc:
    enabled: true

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Observability__Otlp__Endpoint: http://otel-collector.observability.svc.cluster.local:4317
  Kafka__BootstrapServers: urfu-kafka.urfu-platform.svc.cluster.local:9092
  Kafka__ConsumerTopic: urfu.user.events.v1
  Kafka__ConsumerGroup: presence-privacy-projection-v1
  Auth__TokenHeader: X-Pomerium-Jwt-Assertion
  Auth__JwksUrl: http://pomerium.urfu-platform.svc.cluster.local/.well-known/pomerium/jwks.json
  Auth__Audience: urfu-link.ghjc.ru
  Auth__ValidIssuer: urfu-link.ghjc.ru
  Auth__NameClaim: email
  Auth__RoleClaim: groups
  Auth__Internal__JwksUrl: http://keycloak.urfu-platform.svc.cluster.local:8080/realms/urfu-link/protocol/openid-connect/certs
  Auth__Internal__Audience: urfu-link-api
  Auth__Internal__ValidIssuer: https://id.ghjc.ru/realms/urfu-link
  Auth__Internal__RoleClaim: groups
  Infrastructure__Redis__Configuration: urfu-redis.urfu-platform.svc.cluster.local:6379

secrets:
  enabled: true
  name: presence-service-secrets

rollout:
  enabled: true
  autoPromotionEnabled: true

# SignalR PresenceHub runs without a Redis backplane in this MVP — keep a single
# replica and disable HPA until a backplane is introduced (separate issue).
autoscaling:
  enabled: false

serviceMonitor:
  enabled: true

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

migrations:
  enabled: true
  command: ["dotnet", "PresenceService.Api.dll", "--migrate"]

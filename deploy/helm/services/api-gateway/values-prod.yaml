nameOverride: api-gateway
fullnameOverride: api-gateway
image:
  repository: ghcr.io/horexdev/urfu-link/api-gateway
  pullPolicy: Always
  tag: stable

replicaCount: 1

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Observability__Otlp__Endpoint: http://otel-collector.observability.svc.cluster.local:4317
  Auth__Authority: http://keycloak.urfu-platform.svc.cluster.local:8080/realms/urfu-link

secrets:
  enabled: true
  name: api-gateway-secrets

rollout:
  enabled: true
  autoPromotionEnabled: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

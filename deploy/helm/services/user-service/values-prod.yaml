nameOverride: user-service
fullnameOverride: user-service
image:
  repository: ghcr.io/horexdev/urfu-link/user-service
  pullPolicy: Always
  tag: stable

imagePullSecrets:
  - name: ghcr-pull-secret

replicaCount: 1

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Observability__Otlp__Endpoint: http://otel-collector.observability.svc.cluster.local:4317
  Kafka__BootstrapServers: urfu-kafka-kafka-bootstrap.urfu-platform.svc.cluster.local:9092
  Kafka__SecurityProtocol: SaslSsl
  Kafka__SaslMechanism: ScramSha512
  Auth__Authority: http://keycloak.urfu-platform.svc.cluster.local:8080/realms/urfu-link
  Infrastructure__Redis__Configuration: urfu-redis.urfu-platform.svc.cluster.local:6379

secrets:
  enabled: true
  name: user-service-secrets

rollout:
  enabled: true
  autoPromotionEnabled: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

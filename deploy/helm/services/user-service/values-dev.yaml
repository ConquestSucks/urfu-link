nameOverride: user-service
fullnameOverride: user-service
image:
  repository: urfu-link/user-service
  pullPolicy: IfNotPresent
  tag: dev-local

replicaCount: 1

service:
  grpc:
    enabled: true

env:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://+:8080

secrets:
  enabled: true
  name: user-service-secrets

rollout:
  enabled: false
  autoPromotionEnabled: true

autoscaling:
  enabled: false

serviceMonitor:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

migrations:
  enabled: true
  command: ["dotnet", "UserService.Api.dll", "--migrate"]


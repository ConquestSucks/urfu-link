nameOverride: notification-service
fullnameOverride: notification-service
image:
  repository: ghcr.io/conquestsucks/urfu-link/notification-service
  pullPolicy: IfNotPresent
  tag: sha-7759d22

imagePullSecrets:
  - name: ghcr-pull-secret

replicaCount: 1

service:
  grpc:
    enabled: true

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Observability__Otlp__Endpoint: http://otel-collector.observability.svc.cluster.local:4317
  Kafka__BootstrapServers: urfu-kafka.urfu-platform.svc.cluster.local:9092
  Auth__TokenHeader: X-Pomerium-Jwt-Assertion
  Auth__JwksUrl: http://pomerium.urfu-platform.svc.cluster.local/.well-known/pomerium/jwks.json
  Auth__Audience: urfu-link.ghjc.ru
  Auth__ValidIssuer: urfu-link.ghjc.ru
  Auth__NameClaim: email
  Auth__RoleClaim: groups
  Infrastructure__Redis__Configuration: urfu-redis.urfu-platform.svc.cluster.local:6379
  UserService__GrpcEndpoint: http://user-service:8081
  PresenceService__GrpcEndpoint: http://presence-service:8081

secrets:
  enabled: true
  name: notification-service-secrets

rollout:
  enabled: true
  autoPromotionEnabled: true

autoscaling:
  enabled: false

serviceMonitor:
  enabled: true

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Helm pre-upgrade Job (helm.sh/hook-weight: -5) runs `--migrate` against the
# same image and secrets before any new app pod starts. A non-zero exit aborts
# the rollout so the new pods never face an un-migrated schema.
migrations:
  enabled: true
  command: ["dotnet", "NotificationService.Api.dll", "--migrate"]

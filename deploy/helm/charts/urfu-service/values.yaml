nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/conquestsucks/urfu-link/service
  pullPolicy: IfNotPresent
  tag: "latest"
  digest: ""

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  linkerd.io/inject: enabled
  config.linkerd.io/proxy-cpu-request: "10m"
  config.linkerd.io/proxy-cpu-limit: "200m"
  config.linkerd.io/proxy-memory-request: "32Mi"
  config.linkerd.io/proxy-memory-limit: "400Mi"

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  grpc:
    enabled: false
    port: 8081

revisionHistoryLimit: 3

minReadySeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: true
  allowFromSameNamespace: true
  allowToSameNamespace: true
  allowDns: true
  allowedIngressNamespaces: []
  allowedEgressNamespaces:
    - urfu-platform
    - observability
    - linkerd

serviceMonitor:
  enabled: false
  namespace: observability
  interval: 30s
  scrapePath: /metrics

rollout:
  enabled: true
  autoPromotionEnabled: false

env:
  ASPNETCORE_URLS: http://+:8080
  ASPNETCORE_ENVIRONMENT: Production

secrets:
  enabled: false
  name: ""

probes:
  livenessPath: /health/live
  readinessPath: /health/ready
  startupPath: /health/live
  startupEnabled: true

# EF Core migrations applied via Helm pre-install/pre-upgrade Job.
# Disabled by default; opt-in for services that own a relational schema.
migrations:
  enabled: false
  command: []
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  serviceAccount:
    create: true
    annotations: {}
    name: ""
    automountServiceAccountToken: false
  resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

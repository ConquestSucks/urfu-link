apiVersion: v1
kind: Service
metadata:
  name: {{ include "urfu-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "urfu-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "urfu-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.rollout.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "urfu-service.fullname" . }}-preview
  labels:
    app.kubernetes.io/name: {{ include "urfu-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "urfu-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

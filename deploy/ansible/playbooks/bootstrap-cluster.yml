---
- name: Bootstrap Urfu-Link Production Cluster
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Ensure Ansible remote tmp directory exists
      raw: install -d -m 0700 /root/.ansible/tmp
      changed_when: false
    - name: Gather facts
      setup:
        gather_subset:
          - all
  
  roles:
    - role: ../roles/os_prep
      tags: ['os']
      
    - role: ../roles/k3s
      tags: ['k3s']
      
    - role: ../roles/argocd_bootstrap
      tags: ['argocd']

all:
  children:
    k3s_cluster:
      hosts:
        prod-node-01:
          ansible_host: 192.168.1.100 # REPLACE WITH ACTUAL SERVER IP
          ansible_user: ubuntu # REPLACE WITH YOUR SSH USER
          ansible_python_interpreter: /usr/bin/python3
          
          # Optional: SSH Key Path
          # ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          
          # Optional: Proxy configuration (will be applied to OS and k3s)
          # proxy_env:
          #   http_proxy: "socks5://user:pass@proxy_host:1080"
          #   https_proxy: "socks5://user:pass@proxy_host:1080"
          #   no_proxy: "localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12,.svc,.cluster.local,.urfu-link.local,.ghjc.ru"
  
  vars:
    # Cluster configuration
    domain: ghjc.ru
    cluster_name: urfu-prod
    k3s_version: "v1.30.0+k3s1" # Use stable version
    
    # ArgoCD Configuration
    argocd_version: "v2.14.11"
    
    # Kubeconfig local copy path
    local_kubeconfig_path: "../../kubeconfig-prod.yaml"

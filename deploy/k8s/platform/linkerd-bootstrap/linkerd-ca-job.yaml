apiVersion: v1
kind: ServiceAccount
metadata:
  name: linkerd-ca-job
  namespace: linkerd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: linkerd-ca-job
  namespace: linkerd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["create", "get", "update", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: linkerd-ca-job
  namespace: linkerd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: linkerd-ca-job
subjects:
  - kind: ServiceAccount
    name: linkerd-ca-job
    namespace: linkerd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: linkerd-ca-bootstrap
  namespace: linkerd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      serviceAccountName: linkerd-ca-job
      restartPolicy: OnFailure
      containers:
        - name: linkerd-ca-bootstrap
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              apk add --no-cache curl jq >/dev/null

              APISERVER="https://kubernetes.default.svc"
              SERVICEACCOUNT="/var/run/secrets/kubernetes.io/serviceaccount"
              TOKEN="$(cat "${SERVICEACCOUNT}/token")"
              CACERT="${SERVICEACCOUNT}/ca.crt"

              configmap_http_code() {
                curl --silent --output /dev/null --write-out "%{http_code}" --cacert "${CACERT}" \
                  --header "Authorization: Bearer ${TOKEN}" \
                  "${APISERVER}/api/v1/namespaces/linkerd/configmaps/$1" || true
              }

              create_configmap() {
                curl --fail --silent --show-error --cacert "${CACERT}" \
                  --header "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/json" \
                  -H "Content-Type: application/json" \
                  -X POST "${APISERVER}/api/v1/namespaces/linkerd/configmaps" \
                  -d "$1" >/dev/null
              }
              
              get_secret() {
                  curl --silent --fail --cacert "${CACERT}" \
                  --header "Authorization: Bearer ${TOKEN}" \
                  "${APISERVER}/api/v1/namespaces/linkerd/secrets/$1" || true
              }

              CODE="$(configmap_http_code linkerd-identity-trust-roots)"
              if [ "$CODE" = "200" ]; then
                echo "ConfigMap linkerd-identity-trust-roots already exists."
                exit 0
              fi

              echo "Waiting for Secret linkerd-identity-trust-roots to be available..."
              while true; do
                 SECRET_JSON="$(get_secret linkerd-identity-trust-roots)"
                 if [ -n "$SECRET_JSON" ]; then
                     CRT_B64="$(echo "$SECRET_JSON" | jq -r '.data["ca.crt"]')"
                     if [ "$CRT_B64" = "null" ]; then
                         CRT_B64="$(echo "$SECRET_JSON" | jq -r '.data["tls.crt"]')"
                     fi
                     
                     if [ -n "$CRT_B64" ] && [ "$CRT_B64" != "null" ]; then
                        echo "Found certificate in Secret."
                        break
                     fi
                 fi
                 sleep 3
              done

              echo "$CRT_B64" | base64 -d > ca.crt
              CRT_LITERAL="$(awk 'NF {sub(/\r/, ""); printf "%s\\n",$0;}' ca.crt)"

              CM_JSON="$(printf '{"apiVersion":"v1","kind":"ConfigMap","metadata":{"name":"linkerd-identity-trust-roots"},"data":{"ca-bundle.crt":"%s"}}' "$CRT_LITERAL")"

              echo "Creating ConfigMap..."
              create_configmap "$CM_JSON"
              
              echo "Done."

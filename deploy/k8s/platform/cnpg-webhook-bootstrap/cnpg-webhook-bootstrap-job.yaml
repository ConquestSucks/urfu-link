apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-webhook-bootstrap
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-webhook-bootstrap
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-webhook-bootstrap
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cnpg-webhook-bootstrap
subjects:
  - kind: ServiceAccount
    name: cnpg-webhook-bootstrap
    namespace: cnpg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-webhook-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-webhook-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnpg-webhook-bootstrap
subjects:
  - kind: ServiceAccount
    name: cnpg-webhook-bootstrap
    namespace: cnpg-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-webhook-bootstrap
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  template:
    spec:
      serviceAccountName: cnpg-webhook-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: cnpg-webhook-bootstrap
          image: python:3.12-alpine
          command:
            - python
            - -c
            - |
              import json
              import ssl
              import time
              import urllib.error
              import urllib.request

              APISERVER = "https://kubernetes.default.svc"
              SERVICEACCOUNT = "/var/run/secrets/kubernetes.io/serviceaccount"

              with open(f"{SERVICEACCOUNT}/token", "r", encoding="utf-8") as fh:
                  TOKEN = fh.read().strip()

              CONTEXT = ssl.create_default_context(cafile=f"{SERVICEACCOUNT}/ca.crt")
              HEADERS = {
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/json",
              }

              def api_get(path, allow_not_found=False):
                  request = urllib.request.Request(f"{APISERVER}{path}", headers=HEADERS)
                  try:
                      with urllib.request.urlopen(request, context=CONTEXT) as response:
                          return json.load(response)
                  except urllib.error.HTTPError as exc:
                      if allow_not_found and exc.code == 404:
                          return None
                      raise

              def api_put(path, payload):
                  data = json.dumps(payload).encode("utf-8")
                  request = urllib.request.Request(
                      f"{APISERVER}{path}",
                      data=data,
                      headers={**HEADERS, "Content-Type": "application/json"},
                      method="PUT",
                  )
                  with urllib.request.urlopen(request, context=CONTEXT):
                      return

              while True:
                  secret = api_get("/api/v1/namespaces/cnpg-system/secrets/cnpg-ca-secret", allow_not_found=True)
                  ca_bundle = ((secret or {}).get("data") or {}).get("ca.crt")
                  if ca_bundle:
                      break
                  time.sleep(3)

              def ensure_cabundle(kind, name):
                  path = f"/apis/admissionregistration.k8s.io/v1/{kind}/{name}"

                  while True:
                      current = api_get(path, allow_not_found=True)
                      if current:
                          break
                      time.sleep(3)

                  webhooks = current.get("webhooks", [])
                  if all(((webhook.get("clientConfig") or {}).get("caBundle") == ca_bundle) for webhook in webhooks):
                      return

                  metadata = current.setdefault("metadata", {})
                  metadata.pop("managedFields", None)
                  metadata.pop("creationTimestamp", None)
                  metadata.pop("generation", None)
                  metadata.pop("uid", None)
                  annotations = metadata.get("annotations")
                  if isinstance(annotations, dict):
                      annotations.pop("kubectl.kubernetes.io/last-applied-configuration", None)

                  for webhook in webhooks:
                      webhook.setdefault("clientConfig", {})["caBundle"] = ca_bundle

                  api_put(path, current)

              ensure_cabundle("mutatingwebhookconfigurations", "cnpg-mutating-webhook-configuration")
              ensure_cabundle("validatingwebhookconfigurations", "cnpg-validating-webhook-configuration")

apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      attributes/loki:
        actions:
          - key: loki.resource.labels
            action: insert
            value: "app.kubernetes.io/name, app.kubernetes.io/instance"
    exporters:
      debug:
        verbosity: normal
      prometheusremotewrite:
        endpoint: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write"
      loki:
        endpoint: "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [batch, attributes/loki]
          exporters: [loki]

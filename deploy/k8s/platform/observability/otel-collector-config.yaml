apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/observability_otel-collector*/**
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          - type: container
            id: container-parser
            add_metadata_from_filepath: true

    processors:
      batch:
        send_batch_size: 1000
        timeout: 5s

      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.container.name
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.job.name
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: app_name
              key: app.kubernetes.io/name
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name

      transform/service-name:
        log_statements:
          - context: resource
            statements:
              - set(attributes["service.name"], attributes["k8s.deployment.name"]) where attributes["k8s.deployment.name"] != nil
              - set(attributes["service.name"], attributes["k8s.daemonset.name"]) where attributes["k8s.daemonset.name"] != nil
              - set(attributes["service.name"], attributes["k8s.statefulset.name"]) where attributes["k8s.statefulset.name"] != nil
              - set(attributes["service.name"], attributes["k8s.job.name"]) where attributes["k8s.job.name"] != nil
              - set(attributes["service.name"], attributes["app_name"]) where attributes["service.name"] == "unknown_service" and attributes["app_name"] != nil
              - set(attributes["service.name"], attributes["app"]) where attributes["service.name"] == "unknown_service" and attributes["app"] != nil
              - set(attributes["service.name"], attributes["k8s.container.name"]) where attributes["service.name"] == "unknown_service" and attributes["k8s.container.name"] != nil

      resource/loki:
        attributes:
          - key: loki.attribute.labels
            action: insert
            value: k8s.namespace.name, k8s.pod.name, k8s.container.name, k8s.deployment.name

    exporters:
      debug:
        verbosity: normal

      prometheusremotewrite:
        endpoint: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write"

      otlphttp/loki:
        endpoint: "http://loki.observability.svc.cluster.local:3100/otlp"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite]
        logs/otlp:
          receivers: [otlp]
          processors: [batch, k8sattributes, resource/loki]
          exporters: [otlphttp/loki]
        logs/filelog:
          receivers: [filelog]
          processors: [batch, k8sattributes, transform/service-name, resource/loki]
          exporters: [otlphttp/loki]

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-bootstrap-secret
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minio-bootstrap-secret
    creationPolicy: Owner
  data:
    - secretKey: endpoint
      remoteRef:
        key: urfu-link/prod/minio
        property: endpoint
    - secretKey: access_key
      remoteRef:
        key: urfu-link/prod/minio
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: urfu-link/prod/minio
        property: secret_key

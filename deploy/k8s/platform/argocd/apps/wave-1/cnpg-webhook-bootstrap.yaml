apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-webhook-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: urfu-link
  source:
    repoURL: https://github.com/ConquestSucks/urfu-link.git
    targetRevision: master
    path: deploy/k8s/platform/cnpg-webhook-bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - Replace=true

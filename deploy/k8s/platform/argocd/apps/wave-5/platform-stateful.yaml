apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-stateful
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/ConquestSucks/urfu-link.git
    targetRevision: HEAD
    path: deploy/k8s/platform/stateful
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

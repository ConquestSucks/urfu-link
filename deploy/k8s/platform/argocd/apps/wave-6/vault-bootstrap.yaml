apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: urfu-link
  source:
    repoURL: https://github.com/ConquestSucks/urfu-link.git
    targetRevision: master
    path: deploy/k8s/platform/vault
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

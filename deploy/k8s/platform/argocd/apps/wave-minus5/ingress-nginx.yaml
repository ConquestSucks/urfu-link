apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: urfu-link
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.12.0
    chart: ingress-nginx
    helm:
      releaseName: ingress-nginx
      parameters:
        - name: controller.admissionWebhooks.certManager.enabled
          value: "true"
        - name: controller.hostNetwork
          value: "true"
        - name: controller.dnsPolicy
          value: ClusterFirstWithHostNet
        - name: controller.service.type
          value: ClusterIP
        - name: controller.kind
          value: DaemonSet
        - name: controller.config.custom-http-errors
          value: "400,404,405,408,429,500,502,503,504"
        - name: controller.extraArgs.default-backend-service
          value: ingress-nginx/custom-error-pages
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

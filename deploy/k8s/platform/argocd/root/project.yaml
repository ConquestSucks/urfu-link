apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: urfu-link
  namespace: argocd
spec:
  description: URFU Link environments
  sourceRepos:
    - https://github.com/ConquestSucks/urfu-link.git
  destinations:
    - namespace: urfu-prod
      server: https://kubernetes.default.svc
    - namespace: urfu-platform
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding

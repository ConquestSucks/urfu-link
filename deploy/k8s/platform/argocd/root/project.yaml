apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: urfu-link
  namespace: argocd
spec:
  description: URFU Link environments
  sourceRepos:
    - '*'
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

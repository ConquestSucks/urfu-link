apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web-oauth2-proxy
  namespace: urfu-prod
  labels:
    app.kubernetes.io/name: frontend-web-oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-web-oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-web-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url=https://id.ghjc.ru/realms/urfu-link
            - --redeem-url=http://keycloak.urfu-platform.svc.cluster.local:8080/realms/urfu-link/protocol/openid-connect/token
            - --oidc-jwks-url=http://keycloak.urfu-platform.svc.cluster.local:8080/realms/urfu-link/protocol/openid-connect/certs
            - --profile-url=http://keycloak.urfu-platform.svc.cluster.local:8080/realms/urfu-link/protocol/openid-connect/userinfo
            - --insecure-oidc-skip-issuer-verification=true
            - --client-id=$(CLIENT_ID)
            - --client-secret=$(CLIENT_SECRET)
            - --cookie-secret=$(COOKIE_SECRET)
            - --cookie-secure=true
            - --cookie-httponly=true
            - --cookie-samesite=lax
            - --cookie-name=_urfu_link_oauth2
            - --cookie-expire=1h
            - --cookie-refresh=5m
            - --http-address=0.0.0.0:4180
            - --upstream=static://200
            - --email-domain=*
            - --skip-provider-button=true
            - --redirect-url=https://urfu-link.ghjc.ru/oauth2/callback
            - --scope=openid email profile
            - --code-challenge-method=S256
            - --set-authorization-header=true
            - --set-xauthrequest=true
            - --pass-access-token=false
            - --silence-ping-logging=true
            - --skip-jwt-bearer-tokens=true
            - --session-store-type=redis
            - --redis-connection-url=redis://urfu-redis.urfu-platform.svc.cluster.local:6379
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: frontend-web-oauth2
                  key: client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-web-oauth2
                  key: client-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-web-oauth2
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pomerium
  namespace: urfu-platform
  labels:
    app.kubernetes.io/name: pomerium
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pomerium
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pomerium
    spec:
      containers:
        - name: pomerium
          image: cr.pomerium.com/pomerium/pomerium:v0.27.2
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: INSECURE_SERVER
              value: "true"
            - name: ADDRESS
              value: ":80"
            - name: AUTHENTICATE_SERVICE_URL
              value: "https://auth.ghjc.ru"
            - name: IDP_PROVIDER
              value: "oidc"
            - name: IDP_PROVIDER_URL
              value: "https://id.ghjc.ru/realms/urfu-link"
            - name: IDP_SCOPES
              value: "openid,email,profile,roles"
            - name: COOKIE_DOMAIN
              value: ".ghjc.ru"
            - name: COOKIE_NAME
              value: "_pomerium"
            - name: COOKIE_EXPIRE
              value: "1h"
            - name: DATABROKER_STORAGE_TYPE
              value: "redis"
            - name: DATABROKER_STORAGE_CONNECTION_STRING
              value: "redis://urfu-redis.urfu-platform.svc.cluster.local:6379"
            - name: LOG_LEVEL
              value: "info"
            - name: IDP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: pomerium
                  key: client-id
            - name: IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pomerium
                  key: client-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: pomerium
                  key: cookie-secret
            - name: SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: pomerium
                  key: shared-secret
            - name: SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: pomerium
                  key: signing-key
          volumeMounts:
            - name: config
              mountPath: /pomerium/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: pomerium-config

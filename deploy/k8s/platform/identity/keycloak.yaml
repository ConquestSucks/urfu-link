apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: theme-init
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              mkdir -p /theme/login/resources/css /theme/login/resources/img /theme/login/messages
              cp /theme-src/theme.properties /theme/theme.properties
              cp /theme-src/template.ftl /theme/login/template.ftl
              cp /theme-src/login.ftl /theme/login/login.ftl
              cp /theme-src/login-reset-password.ftl /theme/login/login-reset-password.ftl
              cp /theme-src/login-update-password.ftl /theme/login/login-update-password.ftl
              cp /theme-src/login-otp.ftl /theme/login/login-otp.ftl
              cp /theme-src/login-config-totp.ftl /theme/login/login-config-totp.ftl
              cp /theme-src/error.ftl /theme/login/error.ftl
              cp /theme-src/info.ftl /theme/login/info.ftl
              cp /theme-src/login.css /theme/login/resources/css/login.css
              cp /theme-src/logo.svg /theme/login/resources/img/logo.svg
              cp /theme-src/messages_ru.properties /theme/login/messages/messages_ru.properties
              cp /theme-src/messages_en.properties /theme/login/messages/messages_en.properties
          volumeMounts:
            - name: theme-src
              mountPath: /theme-src
              readOnly: true
            - name: theme
              mountPath: /theme
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.6
          args:
            - "start"
            - "--http-enabled=true"
            - "--hostname=https://id.ghjc.ru"
            - "--proxy-headers=xforwarded"
            - "--cache=local"
            - "--health-enabled=true"
            - "--metrics-enabled=true"
          env:
            - name: JAVA_OPTS_KC_HEAP
              value: "-Xms256m -Xmx768m"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db_host
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db_name
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db_username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db_password
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin_username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin_password
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: management
          startupProbe:
            httpGet:
              path: /health/started
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            periodSeconds: 20
          volumeMounts:
            - name: theme
              mountPath: /opt/keycloak/themes/urfu-link
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1280Mi
      volumes:
        - name: theme-src
          configMap:
            name: keycloak-theme-urfu-link
        - name: theme
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - id.ghjc.ru
      secretName: keycloak-id-tls
  rules:
    - host: id.ghjc.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

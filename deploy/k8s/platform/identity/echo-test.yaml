apiVersion: v1
kind: Pod
metadata:
  name: echo-test
  namespace: urfu-prod
  labels:
    app: echo-test
spec:
  containers:
    - name: echo
      image: ealen/echo-server:0.9.2
      ports:
        - containerPort: 8080
      env:
        - name: PORT
          value: "8080"
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: echo-test
  namespace: urfu-prod
spec:
  selector:
    app: echo-test
  ports:
    - port: 8080
      targetPort: 8080

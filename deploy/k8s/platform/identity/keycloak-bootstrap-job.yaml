apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
    argocd.argoproj.io/sync-wave: "3"
spec:
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: keycloak-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: keycloak-bootstrap
          image: hashicorp/vault:1.21.4
          env:
            - name: VAULT_ADDR
              value: "http://vault-internal.vault.svc.cluster.local:8200"
            - name: KEYCLOAK_URL
              value: "http://keycloak.urfu-platform.svc.cluster.local:8080"
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              apk add --no-cache curl jq openssl >/dev/null 2>&1

              SERVICEACCOUNT="/var/run/secrets/kubernetes.io/serviceaccount"

              wait_for_vault() {
                echo "Waiting for Vault..."
                while true; do
                  STATUS_JSON="$(curl --silent "${VAULT_ADDR}/v1/sys/health" || true)"
                  if echo "$STATUS_JSON" | grep -Eq '"initialized"[[:space:]]*:[[:space:]]*true' &&
                     echo "$STATUS_JSON" | grep -Eq '"sealed"[[:space:]]*:[[:space:]]*false'; then
                    echo "Vault is ready."
                    return 0
                  fi
                  sleep 3
                done
              }

              vault_login() {
                echo "Logging into Vault..."
                LOGIN_RESPONSE="$(curl --silent \
                  --request POST \
                  --data "{\"role\":\"keycloak-bootstrap\",\"jwt\":\"$(cat "${SERVICEACCOUNT}/token")\"}" \
                  "${VAULT_ADDR}/v1/auth/kubernetes/login")"
                VAULT_TOKEN="$(echo "$LOGIN_RESPONSE" | jq -r '.auth.client_token')"
                if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
                  echo "Failed to authenticate to Vault"
                  exit 1
                fi
              }

              vault_read() {
                curl --silent \
                  --header "X-Vault-Token: ${VAULT_TOKEN}" \
                  "${VAULT_ADDR}/v1/kv/data/$1"
              }

              vault_put() {
                curl --fail --silent --show-error \
                  --header "X-Vault-Token: ${VAULT_TOKEN}" \
                  --header "Content-Type: application/json" \
                  --request POST \
                  --data "$2" \
                  "${VAULT_ADDR}/v1/kv/data/$1" >/dev/null
              }

              wait_for_keycloak() {
                echo "Waiting for Keycloak..."
                while true; do
                  if curl --silent --fail "${KEYCLOAK_URL}/realms/master" >/dev/null 2>&1; then
                    echo "Keycloak is ready."
                    return 0
                  fi
                  sleep 5
                done
              }

              get_admin_token() {
                echo "Getting Keycloak admin token..."
                TOKEN_RESPONSE="$(curl --silent --fail \
                  -X POST "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                  -d "grant_type=password" \
                  -d "client_id=admin-cli" \
                  -d "username=${KC_ADMIN_USER}" \
                  -d "password=${KC_ADMIN_PASS}")"
                KC_TOKEN="$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')"
                if [ -z "$KC_TOKEN" ] || [ "$KC_TOKEN" = "null" ]; then
                  echo "Failed to get Keycloak admin token"
                  exit 1
                fi
              }

              ensure_realm() {
                echo "Ensuring realm 'urfu-link' exists..."
                REALM_STATUS="$(curl --silent --output /dev/null --write-out "%{http_code}" \
                  -H "Authorization: Bearer ${KC_TOKEN}" \
                  "${KEYCLOAK_URL}/admin/realms/urfu-link")"
                if [ "$REALM_STATUS" = "404" ]; then
                  echo "Creating realm 'urfu-link'..."
                  curl --fail --silent --show-error \
                    -X POST \
                    -H "Authorization: Bearer ${KC_TOKEN}" \
                    -H "Content-Type: application/json" \
                    "${KEYCLOAK_URL}/admin/realms" \
                    -d '{
                      "realm": "urfu-link",
                      "enabled": true,
                      "registrationAllowed": false,
                      "loginWithEmailAllowed": true,
                      "resetPasswordAllowed": true,
                      "loginTheme": "urfu-link",
                      "roles": {
                        "realm": [
                          {"name": "admin"},
                          {"name": "user"},
                          {"name": "service"}
                        ]
                      }
                    }' >/dev/null
                  echo "Realm created."
                else
                  echo "Realm already exists, ensuring login theme..."
                  curl --fail --silent --show-error \
                    -X PUT \
                    -H "Authorization: Bearer ${KC_TOKEN}" \
                    -H "Content-Type: application/json" \
                    "${KEYCLOAK_URL}/admin/realms/urfu-link" \
                    -d '{"loginTheme": "urfu-link"}' >/dev/null
                  echo "Login theme set."
                fi
              }

              # ensure_client <clientId> <redirectUrisJson> <webOriginsJson> [isPublic] [displayName] [baseUrl] [serviceAccountsEnabled]
              # Sets CLIENT_SECRET and CLIENT_UUID as output
              ensure_client() {
                local CL_ID="$1"
                local REDIRECT_URIS_JSON="$2"
                local WEB_ORIGINS_JSON="$3"
                local IS_PUBLIC="${4:-false}"
                local DISPLAY_NAME="${5:-}"
                local BASE_URL="${6:-}"
                local SERVICE_ACCOUNTS="${7:-false}"

                echo "Ensuring client '${CL_ID}'..."

                CLIENTS_JSON="$(curl --silent --fail \
                  -H "Authorization: Bearer ${KC_TOKEN}" \
                  "${KEYCLOAK_URL}/admin/realms/urfu-link/clients?clientId=${CL_ID}")"

                CLIENT_UUID="$(echo "$CLIENTS_JSON" | jq -r '.[0].id // empty')"

                if [ -z "$CLIENT_UUID" ]; then
                  echo "Creating client '${CL_ID}'..."
                  CLIENT_JSON="$(jq -n \
                      --arg clientId "$CL_ID" \
                      --arg name "${DISPLAY_NAME:-$CL_ID}" \
                      --arg baseUrl "$BASE_URL" \
                      --argjson redirectUris "$REDIRECT_URIS_JSON" \
                      --argjson webOrigins "$WEB_ORIGINS_JSON" \
                      --argjson publicClient "$IS_PUBLIC" \
                      --argjson serviceAccounts "$SERVICE_ACCOUNTS" \
                      '{
                        clientId: $clientId,
                        name: $name,
                        enabled: true,
                        publicClient: $publicClient,
                        standardFlowEnabled: true,
                        directAccessGrantsEnabled: false,
                        serviceAccountsEnabled: $serviceAccounts,
                        protocol: "openid-connect",
                        redirectUris: $redirectUris,
                        webOrigins: $webOrigins
                      } | if $baseUrl != "" then . + {baseUrl: $baseUrl} else . end')"
                  curl --fail --silent --show-error \
                    -X POST \
                    -H "Authorization: Bearer ${KC_TOKEN}" \
                    -H "Content-Type: application/json" \
                    "${KEYCLOAK_URL}/admin/realms/urfu-link/clients" \
                    -d "$CLIENT_JSON" >/dev/null

                  CLIENTS_JSON="$(curl --silent --fail \
                    -H "Authorization: Bearer ${KC_TOKEN}" \
                    "${KEYCLOAK_URL}/admin/realms/urfu-link/clients?clientId=${CL_ID}")"
                  CLIENT_UUID="$(echo "$CLIENTS_JSON" | jq -r '.[0].id')"
                  echo "Client created with UUID: ${CLIENT_UUID}"
                else
                  echo "Client '${CL_ID}' already exists (UUID: ${CLIENT_UUID}), updating display info..."
                  UPDATE_JSON="$(jq -n \
                    --arg name "${DISPLAY_NAME:-$CL_ID}" \
                    --arg baseUrl "$BASE_URL" \
                    --argjson serviceAccounts "$SERVICE_ACCOUNTS" \
                    '{ name: $name, serviceAccountsEnabled: $serviceAccounts } | if $baseUrl != "" then . + {baseUrl: $baseUrl} else . end')"
                  curl --fail --silent --show-error \
                    -X PUT \
                    -H "Authorization: Bearer ${KC_TOKEN}" \
                    -H "Content-Type: application/json" \
                    "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${CLIENT_UUID}" \
                    -d "$UPDATE_JSON" >/dev/null 2>&1 || true
                fi

                if [ "$IS_PUBLIC" = "false" ]; then
                  SECRET_JSON="$(curl --silent --fail \
                    -H "Authorization: Bearer ${KC_TOKEN}" \
                    "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${CLIENT_UUID}/client-secret")"
                  CLIENT_SECRET="$(echo "$SECRET_JSON" | jq -r '.value')"
                else
                  CLIENT_SECRET=""
                fi
              }

              # ensure_groups_mapper <clientUuid>
              # Adds realm-roles-to-groups protocol mapper if not present
              ensure_groups_mapper() {
                local CL_UUID="$1"
                echo "Ensuring groups mapper on client ${CL_UUID}..."
                EXISTING_MAPPERS="$(curl --silent --fail \
                  -H "Authorization: Bearer ${KC_TOKEN}" \
                  "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${CL_UUID}/protocol-mappers/models")"
                if ! echo "$EXISTING_MAPPERS" | jq -e '.[] | select(.name=="realm roles to groups")' >/dev/null 2>&1; then
                  curl --fail --silent --show-error \
                    -X POST \
                    -H "Authorization: Bearer ${KC_TOKEN}" \
                    -H "Content-Type: application/json" \
                    "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${CL_UUID}/protocol-mappers/models" \
                    -d '{
                      "name": "realm roles to groups",
                      "protocol": "openid-connect",
                      "protocolMapper": "oidc-usermodel-realm-role-mapper",
                      "config": {
                        "multivalued": "true",
                        "id.token.claim": "true",
                        "access.token.claim": "true",
                        "userinfo.token.claim": "true",
                        "claim.name": "groups",
                        "jsonType.label": "String"
                      }
                    }' >/dev/null
                  echo "Groups mapper created."
                else
                  echo "Groups mapper already exists."
                fi
              }

              # ensure_audience_mapper <clientUuid> <audience>
              # Adds audience protocol mapper if not present
              ensure_audience_mapper() {
                local CL_UUID="$1"
                local AUDIENCE="$2"
                echo "Ensuring audience mapper '${AUDIENCE}' on client ${CL_UUID}..."
                EXISTING_MAPPERS="$(curl --silent --fail \
                  -H "Authorization: Bearer ${KC_TOKEN}" \
                  "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${CL_UUID}/protocol-mappers/models")"
                if ! echo "$EXISTING_MAPPERS" | jq -e --arg aud "$AUDIENCE" '.[] | select(.name=="audience-" + $aud)' >/dev/null 2>&1; then
                  curl --fail --silent --show-error \
                    -X POST \
                    -H "Authorization: Bearer ${KC_TOKEN}" \
                    -H "Content-Type: application/json" \
                    "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${CL_UUID}/protocol-mappers/models" \
                    -d "$(jq -n --arg aud "$AUDIENCE" '{
                      name: ("audience-" + $aud),
                      protocol: "openid-connect",
                      protocolMapper: "oidc-audience-mapper",
                      config: {
                        "included.client.audience": $aud,
                        "id.token.claim": "false",
                        "access.token.claim": "true"
                      }
                    }')" >/dev/null
                  echo "Audience mapper created."
                else
                  echo "Audience mapper already exists."
                fi
              }

              # --- Main ---

              wait_for_vault
              vault_login

              echo "Reading Keycloak admin credentials from Vault..."
              KC_VAULT_DATA="$(vault_read urfu-link/prod/keycloak)"
              KC_ADMIN_USER="$(echo "$KC_VAULT_DATA" | jq -r '.data.data.admin_username')"
              KC_ADMIN_PASS="$(echo "$KC_VAULT_DATA" | jq -r '.data.data.admin_password')"

              if [ -z "$KC_ADMIN_USER" ] || [ "$KC_ADMIN_USER" = "null" ]; then
                echo "Failed to read Keycloak admin credentials from Vault"
                exit 1
              fi

              wait_for_keycloak
              get_admin_token
              ensure_realm

              # --- Linkerd Viz ---
              ensure_client "linkerd-viz" '["https://linkerd.ghjc.ru/oauth2/callback"]' '["https://linkerd.ghjc.ru"]' "false" "Linkerd Dashboard" "https://linkerd.ghjc.ru"
              LINKERD_VIZ_SECRET="$CLIENT_SECRET"
              ensure_groups_mapper "$CLIENT_UUID"

              # --- Headlamp ---
              ensure_client "headlamp" '["https://k8s.ghjc.ru/oidc-callback"]' '["https://k8s.ghjc.ru"]' "false" "Headlamp" "https://k8s.ghjc.ru"
              HEADLAMP_SECRET="$CLIENT_SECRET"

              # --- ArgoCD ---
              ensure_client "argocd" '["https://argocd.ghjc.ru/auth/callback"]' '["https://argocd.ghjc.ru"]' "false" "Argo CD" "https://argocd.ghjc.ru"
              ARGOCD_SECRET="$CLIENT_SECRET"
              ensure_groups_mapper "$CLIENT_UUID"

              # --- Vault OIDC ---
              ensure_client "vault-oidc" '["https://vault.ghjc.ru/ui/vault/auth/oidc/oidc/callback","http://localhost:8250/oidc/callback"]' '["https://vault.ghjc.ru"]' "false" "Vault" "https://vault.ghjc.ru"
              VAULT_OIDC_SECRET="$CLIENT_SECRET"
              ensure_groups_mapper "$CLIENT_UUID"

              # --- Grafana ---
              ensure_client "grafana" '["https://grafana.ghjc.ru/login/generic_oauth"]' '["https://grafana.ghjc.ru"]' "false" "Grafana" "https://grafana.ghjc.ru"
              GRAFANA_OIDC_SECRET="$CLIENT_SECRET"
              ensure_groups_mapper "$CLIENT_UUID"

              # --- MinIO Console ---
              ensure_client "minio-console" '["https://minio.ghjc.ru/oauth_callback"]' '["https://minio.ghjc.ru"]' "false" "MinIO Console" "https://minio.ghjc.ru"
              MINIO_OIDC_SECRET="$CLIENT_SECRET"
              ensure_groups_mapper "$CLIENT_UUID"

              # --- User Service Admin (machine-to-machine, Keycloak Admin API) ---
              ensure_client "user-service-admin" '[]' '[]' "false" "User Service Admin" "" "true"
              USER_SERVICE_ADMIN_SECRET="$CLIENT_SECRET"
              USER_SERVICE_ADMIN_UUID="$CLIENT_UUID"

              # Grant view-users role from realm-management to user-service-admin service account
              # Required for GET /admin/realms/{realm}/users/{id}/sessions (GetDevicesEndpoint)
              RM_CLIENT_ID="$(curl --silent -H "Authorization: Bearer ${KC_TOKEN}" \
                "${KEYCLOAK_URL}/admin/realms/urfu-link/clients?clientId=realm-management" | jq -r '.[0].id')"
              SA_USER_ID="$(curl --silent -H "Authorization: Bearer ${KC_TOKEN}" \
                "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${USER_SERVICE_ADMIN_UUID}/service-account-user" | jq -r '.id')"
              VIEW_USERS_ROLE="$(curl --silent -H "Authorization: Bearer ${KC_TOKEN}" \
                "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${RM_CLIENT_ID}/roles/view-users")"
              curl --silent -X POST \
                -H "Authorization: Bearer ${KC_TOKEN}" \
                -H "Content-Type: application/json" \
                "${KEYCLOAK_URL}/admin/realms/urfu-link/users/${SA_USER_ID}/role-mappings/clients/${RM_CLIENT_ID}" \
                -d "[${VIEW_USERS_ROLE}]"
              echo "Granted view-users to user-service-admin service account"

              # --- Frontend Web (public client for mobile) ---
              ensure_client "urfu-link-web" '["https://urfu-link.ghjc.ru/*","http://app.dev.127.0.0.1.nip.io/*"]' '["https://urfu-link.ghjc.ru","http://app.dev.127.0.0.1.nip.io"]' "true" "URFU Link" "https://urfu-link.ghjc.ru"

              # --- Pomerium (centralized auth proxy) ---
              ensure_client "pomerium" '["https://auth.ghjc.ru/oauth2/callback","https://auth.ghjc.ru/.pomerium/callback","https://auth.ghjc.ru/.pomerium/signed_out"]' '["https://*.ghjc.ru"]' "false" "Pomerium Auth Proxy" "https://auth.ghjc.ru"
              POMERIUM_SECRET="$CLIENT_SECRET"
              ensure_groups_mapper "$CLIENT_UUID"
              ensure_audience_mapper "$CLIENT_UUID" "urfu-link-api"

              # Set post-logout redirect URIs for pomerium client (idempotent)
              POMERIUM_FULL="$(curl --silent --fail \
                -H "Authorization: Bearer ${KC_TOKEN}" \
                "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${CLIENT_UUID}")"
              POMERIUM_UPDATED="$(echo "$POMERIUM_FULL" | \
                jq '.attributes["post.logout.redirect.uris"] = "https://urfu-link.ghjc.ru/*"')"
              curl --fail --silent --show-error \
                -X PUT \
                -H "Authorization: Bearer ${KC_TOKEN}" \
                -H "Content-Type: application/json" \
                "${KEYCLOAK_URL}/admin/realms/urfu-link/clients/${CLIENT_UUID}" \
                -d "$POMERIUM_UPDATED" >/dev/null
              echo "Post-logout redirect URIs set for pomerium."

              # Store Pomerium secrets in Vault
              EXISTING_POMERIUM="$(vault_read urfu-link/prod/pomerium || true)"
              POMERIUM_COOKIE="$(echo "$EXISTING_POMERIUM" | jq -r '.data.data.cookie_secret // empty' 2>/dev/null || true)"
              POMERIUM_SHARED="$(echo "$EXISTING_POMERIUM" | jq -r '.data.data.shared_secret // empty' 2>/dev/null || true)"
              POMERIUM_SIGNING="$(echo "$EXISTING_POMERIUM" | jq -r '.data.data.signing_key // empty' 2>/dev/null || true)"
              if [ -z "$POMERIUM_COOKIE" ]; then
                POMERIUM_COOKIE="$(head -c 32 /dev/urandom | base64 | tr '+/' '-_' | head -c 32)"
              fi
              if [ -z "$POMERIUM_SHARED" ]; then
                POMERIUM_SHARED="$(head -c 32 /dev/urandom | base64 | tr '+/' '-_' | head -c 32)"
              fi
              if [ -z "$POMERIUM_SIGNING" ]; then
                POMERIUM_SIGNING="$(openssl ecparam -genkey -name prime256v1 -noout 2>/dev/null | openssl ec 2>/dev/null | base64 | tr -d '\n')"
              fi
              vault_put urfu-link/prod/pomerium \
                "$(printf '{"data":{"client_id":"pomerium","client_secret":"%s","cookie_secret":"%s","shared_secret":"%s","signing_key":"%s"}}' \
                  "$POMERIUM_SECRET" "$POMERIUM_COOKIE" "$POMERIUM_SHARED" "$POMERIUM_SIGNING")"

              # Cookie secret: reuse existing or generate new
              echo "Checking for existing cookie secret..."
              EXISTING_VIZ="$(vault_read urfu-link/prod/linkerd-viz || true)"
              COOKIE_SECRET="$(echo "$EXISTING_VIZ" | jq -r '.data.data.cookie_secret // empty' 2>/dev/null || true)"
              if [ -z "$COOKIE_SECRET" ]; then
                COOKIE_SECRET="$(head -c 32 /dev/urandom | base64 | tr '+/' '-_' | head -c 32)"
                echo "Generated new cookie secret."
              else
                echo "Reusing existing cookie secret."
              fi

              # --- Write secrets to Vault ---
              echo "Writing secrets to Vault..."
              vault_put urfu-link/prod/linkerd-viz \
                "$(printf '{"data":{"client_id":"linkerd-viz","client_secret":"%s","cookie_secret":"%s"}}' \
                  "$LINKERD_VIZ_SECRET" "$COOKIE_SECRET")"

              vault_put urfu-link/prod/headlamp \
                "$(printf '{"data":{"client_id":"headlamp","client_secret":"%s","issuer_url":"https://id.ghjc.ru/realms/urfu-link","scopes":"openid profile email","use_pkce":"true"}}' \
                  "$HEADLAMP_SECRET")"

              vault_put urfu-link/prod/argocd \
                "$(printf '{"data":{"client_id":"argocd","client_secret":"%s"}}' \
                  "$ARGOCD_SECRET")"

              vault_put urfu-link/prod/vault-oidc \
                "$(printf '{"data":{"client_id":"vault-oidc","client_secret":"%s"}}' \
                  "$VAULT_OIDC_SECRET")"

              vault_put urfu-link/prod/grafana-oidc \
                "$(printf '{"data":{"client_id":"grafana","client_secret":"%s"}}' \
                  "$GRAFANA_OIDC_SECRET")"

              vault_put urfu-link/prod/minio-oidc \
                "$(printf '{"data":{"client_id":"minio-console","client_secret":"%s"}}' \
                  "$MINIO_OIDC_SECRET")"

              # Merge user-service-admin client secret into user-service Vault path,
              # preserving the primary_connection written by platform-bootstrap-job.
              echo "Merging user-service-admin secret into user-service Vault path..."
              EXISTING_USER_SVC="$(vault_read urfu-link/prod/user-service || true)"
              USER_SVC_CONN="$(echo "$EXISTING_USER_SVC" | jq -r '.data.data.primary_connection // empty' 2>/dev/null || true)"
              vault_put urfu-link/prod/user-service \
                "$(printf '{"data":{"primary_connection":"%s","keycloak_client_secret":"%s"}}' \
                  "$USER_SVC_CONN" "$USER_SERVICE_ADMIN_SECRET")"

              # --- Update Vault OIDC config with real client secret ---
              echo "Updating Vault OIDC auth config..."
              curl --fail --silent --show-error \
                --header "X-Vault-Token: ${VAULT_TOKEN}" \
                --header "Content-Type: application/json" \
                --request POST \
                --data "$(printf '{"oidc_discovery_url":"https://id.ghjc.ru/realms/urfu-link","oidc_client_id":"vault-oidc","oidc_client_secret":"%s","default_role":"admin"}' "$VAULT_OIDC_SECRET")" \
                "${VAULT_ADDR}/v1/auth/oidc/config" >/dev/null

              echo "Keycloak bootstrap complete!"

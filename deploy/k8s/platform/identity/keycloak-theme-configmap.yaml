apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-theme-urfu-link
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  theme.properties: |
    parent=base
    import=common/keycloak
    
    locales=ru,en
    
    styles=css/login.css
    
  template.ftl: |
    <#macro registrationLayout bodyClass="" displayInfo=false displayMessage=true displayRequiredFields=false>
    <!DOCTYPE html>
    <html lang="${(locale.currentLanguageTag)!'ru'}">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="robots" content="noindex, nofollow">
        <title><#if client?? && client.name?has_content>${client.name}<#else>${realm.displayName!''}</#if> — ${msg("loginTitle", '')}</title>
        <link rel="icon" href="${url.resourcesPath}/img/logo.svg" type="image/svg+xml">
        <link rel="stylesheet" href="${url.resourcesPath}/css/login.css">
    </head>
    <body>
        <div class="login-bg"></div>
    
        <div class="login-page">
            <div class="login-logo">
                <img src="${url.resourcesPath}/img/logo.svg" alt="${realm.displayName!''}" height="40">
            </div>
    
            <div class="login-card">
                <div class="login-card-header">
                    <h1 class="login-card-title"><#nested "header"></h1>
                </div>
    
                <#if displayMessage && message?has_content && (message.type != 'warning' || !isAppInitiatedAction??)>
                    <div class="alert alert-${message.type}">
                        ${kcSanitize(message.summary)?no_esc}
                    </div>
                </#if>
    
                <#nested "form">
            </div>
    
            <#if displayInfo>
                <div class="login-info">
                    <#nested "info">
                </div>
            </#if>
    
            <div class="login-footer">
                <#if client?? && client.baseUrl?has_content>
                    <a href="${client.baseUrl}" class="login-footer-link">${client.name!client.clientId}</a>
                <#else>
                    <span class="login-footer-text">${(realm.displayName!'URFU Link')}</span>
                </#if>
            </div>
        </div>
    </body>
    </html>
    </#macro>
    
  login.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayMessage=!messagesPerField.existsError('username','password'); section>
        <#if section = "header">
            ${msg("loginAccountTitle")}
        <#elseif section = "form">
            <form id="kc-form-login" action="${url.loginAction}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">
                        <#if !realm.loginWithEmailAllowed>
                            ${msg("username")}
                        <#elseif !realm.registrationEmailAsUsername>
                            ${msg("usernameOrEmail")}
                        <#else>
                            ${msg("email")}
                        </#if>
                    </label>
                    <div class="form-input-wrapper">
                        <input id="username" name="username" type="text"
                               class="form-input"
                               value="${(login.username!'')}"
                               autofocus autocomplete="username"
                               aria-invalid="<#if messagesPerField.existsError('username')>true</#if>"
                               dir="ltr" />
                    </div>
                    <#if messagesPerField.existsError('username')>
                        <span class="input-error" aria-live="polite">
                            ${kcSanitize(messagesPerField.get('username'))?no_esc}
                        </span>
                    </#if>
                </div>
    
                <div class="form-group">
                    <label for="password" class="form-label">${msg("password")}</label>
                    <div class="form-input-wrapper form-input-password">
                        <input id="password" name="password" type="password"
                               class="form-input"
                               autocomplete="current-password"
                               aria-invalid="<#if messagesPerField.existsError('password')>true</#if>"
                               dir="ltr" />
                    </div>
                    <#if messagesPerField.existsError('password')>
                        <span class="input-error" aria-live="polite">
                            ${kcSanitize(messagesPerField.get('password'))?no_esc}
                        </span>
                    </#if>
                </div>
    
                <div class="form-actions">
                    <#if realm.rememberMe && !usernameHidden??>
                        <div class="form-checkbox-wrapper">
                            <input id="rememberMe" name="rememberMe" type="checkbox"
                                   <#if login.rememberMe??>checked</#if>>
                            <label for="rememberMe">${msg("rememberMe")}</label>
                        </div>
                    </#if>
    
                    <#if realm.resetPasswordAllowed>
                        <a href="${url.loginResetCredentialsUrl}" class="form-link">${msg("doForgotPassword")}</a>
                    </#if>
                </div>
    
                <input name="credentialId" type="hidden" value="${(auth.selectedCredential!'')}">
                <button id="kc-login" name="login" type="submit" class="btn-primary">
                    ${msg("doLogIn")}
                </button>
            </form>
        </#if>
    </@layout.registrationLayout>
    
  login-reset-password.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayInfo=true displayMessage=!messagesPerField.existsError('username'); section>
        <#if section = "header">
            ${msg("emailForgotTitle")}
        <#elseif section = "form">
            <form id="kc-reset-password-form" action="${url.loginAction}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">
                        <#if !realm.loginWithEmailAllowed>
                            ${msg("username")}
                        <#elseif !realm.registrationEmailAsUsername>
                            ${msg("usernameOrEmail")}
                        <#else>
                            ${msg("email")}
                        </#if>
                    </label>
                    <div class="form-input-wrapper">
                        <input id="username" name="username" type="text"
                               class="form-input"
                               value="${(auth.attemptedUsername!'')}"
                               autofocus autocomplete="username"
                               aria-invalid="<#if messagesPerField.existsError('username')>true</#if>"
                               dir="ltr" />
                    </div>
                    <#if messagesPerField.existsError('username')>
                        <span class="input-error" aria-live="polite">
                            ${kcSanitize(messagesPerField.get('username'))?no_esc}
                        </span>
                    </#if>
                </div>
    
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button type="submit" class="btn-primary">${msg("doSubmit")}</button>
                    <a href="${url.loginUrl}" class="form-link" style="text-align: center;">${msg("backToLogin")}</a>
                </div>
            </form>
        <#elseif section = "info">
            <#if realm.duplicateEmailsAllowed>
                ${msg("emailInstructionUsername")}
            <#else>
                ${msg("emailInstruction")}
            </#if>
        </#if>
    </@layout.registrationLayout>
    
  login-update-password.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayMessage=!messagesPerField.existsError('password','password-confirm'); section>
        <#if section = "header">
            ${msg("updatePasswordTitle")}
        <#elseif section = "form">
            <form id="kc-passwd-update-form" action="${url.loginAction}" method="post">
                <div class="form-group">
                    <label for="password-new" class="form-label">${msg("passwordNew")}</label>
                    <div class="form-input-wrapper form-input-password">
                        <input id="password-new" name="password-new" type="password"
                               class="form-input"
                               autofocus autocomplete="new-password"
                               aria-invalid="<#if messagesPerField.existsError('password','password-confirm')>true</#if>"
                               dir="ltr" />
                    </div>
                    <#if messagesPerField.existsError('password')>
                        <span class="input-error" aria-live="polite">
                            ${kcSanitize(messagesPerField.get('password'))?no_esc}
                        </span>
                    </#if>
                </div>
    
                <div class="form-group">
                    <label for="password-confirm" class="form-label">${msg("passwordConfirm")}</label>
                    <div class="form-input-wrapper form-input-password">
                        <input id="password-confirm" name="password-confirm" type="password"
                               class="form-input"
                               autocomplete="new-password"
                               aria-invalid="<#if messagesPerField.existsError('password-confirm')>true</#if>"
                               dir="ltr" />
                    </div>
                    <#if messagesPerField.existsError('password-confirm')>
                        <span class="input-error" aria-live="polite">
                            ${kcSanitize(messagesPerField.get('password-confirm'))?no_esc}
                        </span>
                    </#if>
                </div>
    
                <#if isAppInitiatedAction??>
                    <div class="btn-group">
                        <button name="login" type="submit" class="btn-primary">${msg("doSubmit")}</button>
                        <button type="submit" name="cancel-aia" value="true" class="btn-secondary">${msg("doCancel")}</button>
                    </div>
                <#else>
                    <button name="login" type="submit" class="btn-primary">${msg("doSubmit")}</button>
                </#if>
            </form>
        </#if>
    </@layout.registrationLayout>
    
  login-otp.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayMessage=!messagesPerField.existsError('totp'); section>
        <#if section = "header">
            ${msg("doLogIn")}
        <#elseif section = "form">
            <form id="kc-otp-login-form" action="${url.loginAction}" method="post">
                <#if otpLogin.userOtpCredentials?size gt 1>
                    <div class="otp-credentials">
                        <#list otpLogin.userOtpCredentials as otpCredential>
                            <label class="otp-credential <#if otpCredential.id == otpLogin.selectedCredentialId>selected</#if>">
                                <input id="kc-otp-credential-${otpCredential?index}"
                                       type="radio" name="selectedCredentialId"
                                       value="${otpCredential.id}"
                                       <#if otpCredential.id == otpLogin.selectedCredentialId>checked</#if>>
                                <span class="otp-credential-label">${otpCredential.userLabel}</span>
                            </label>
                        </#list>
                    </div>
                </#if>
    
                <div class="form-group">
                    <label for="otp" class="form-label">${msg("loginOtpOneTime")}</label>
                    <div class="form-input-wrapper">
                        <input id="otp" name="otp" type="text"
                               class="form-input"
                               autocomplete="one-time-code" inputmode="numeric"
                               autofocus
                               aria-invalid="<#if messagesPerField.existsError('totp')>true</#if>"
                               dir="ltr" />
                    </div>
                    <#if messagesPerField.existsError('totp')>
                        <span class="input-error" aria-live="polite">
                            ${kcSanitize(messagesPerField.get('totp'))?no_esc}
                        </span>
                    </#if>
                </div>
    
                <button name="login" id="kc-login" type="submit" class="btn-primary">
                    ${msg("doLogIn")}
                </button>
            </form>
        </#if>
    </@layout.registrationLayout>
    
  login-config-totp.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayMessage=!messagesPerField.existsError('totp','userLabel'); section>
        <#if section = "header">
            ${msg("loginTotpTitle")}
        <#elseif section = "form">
            <div class="totp-setup">
                <ol class="instruction" style="text-align: left; padding-left: 20px; margin-bottom: 20px;">
                    <li>${msg("loginTotpStep1")}</li>
                    <li>${msg("loginTotpStep2")}</li>
                    <li>${msg("loginTotpStep3")}</li>
                </ol>
    
                <#if mode?? && mode = "manual">
                    <div class="totp-secret">${totp.totpSecretEncoded}</div>
                    <div class="totp-params">
                        ${msg("loginTotpType")}: ${msg("loginTotp." + totp.policy.type)}
                        <br>${msg("loginTotpAlgorithm")}: ${totp.policy.getAlgorithmKey()}
                        <br>${msg("loginTotpDigits")}: ${totp.policy.digits}
                        <#if totp.policy.type = "totp">
                            <br>${msg("loginTotpInterval")}: ${totp.policy.period}
                        <#elseif totp.policy.type = "hotp">
                            <br>${msg("loginTotpCounter")}: ${totp.policy.initialCounter}
                        </#if>
                    </div>
                    <a href="${totp.qrUrl}" class="form-link">${msg("loginTotpScanBarcode")}</a>
                <#else>
                    <div class="totp-qr">
                        <img src="data:image/png;base64, ${totp.totpSecretQrCode}" alt="QR Code" width="200" height="200">
                    </div>
                    <a href="${totp.manualUrl}" class="form-link">${msg("loginTotpUnableToScan")}</a>
                </#if>
            </div>
    
            <form id="kc-totp-settings-form" action="${url.loginAction}" method="post" style="margin-top: 24px;">
                <div class="form-group">
                    <label for="totp" class="form-label">${msg("authenticatorCode")}</label>
                    <div class="form-input-wrapper">
                        <input id="totp" name="totp" type="text"
                               class="form-input"
                               autocomplete="off" inputmode="numeric"
                               autofocus
                               aria-invalid="<#if messagesPerField.existsError('totp')>true</#if>"
                               dir="ltr" />
                    </div>
                    <#if messagesPerField.existsError('totp')>
                        <span class="input-error" aria-live="polite">
                            ${kcSanitize(messagesPerField.get('totp'))?no_esc}
                        </span>
                    </#if>
                </div>
    
                <div class="form-group">
                    <label for="userLabel" class="form-label">${msg("loginTotpDeviceName")}</label>
                    <div class="form-input-wrapper">
                        <input id="userLabel" name="userLabel" type="text"
                               class="form-input"
                               autocomplete="off"
                               aria-invalid="<#if messagesPerField.existsError('userLabel')>true</#if>" />
                    </div>
                    <#if messagesPerField.existsError('userLabel')>
                        <span class="input-error" aria-live="polite">
                            ${kcSanitize(messagesPerField.get('userLabel'))?no_esc}
                        </span>
                    </#if>
                </div>
    
                <input type="hidden" name="totpSecret" value="${totp.totpSecret}">
                <#if mode??><input type="hidden" name="mode" value="${mode}"></#if>
    
                <#if isAppInitiatedAction??>
                    <div class="btn-group">
                        <button type="submit" class="btn-primary">${msg("doSubmit")}</button>
                        <button type="submit" name="cancel-aia" value="true" class="btn-secondary">${msg("doCancel")}</button>
                    </div>
                <#else>
                    <button type="submit" class="btn-primary">${msg("doSubmit")}</button>
                </#if>
            </form>
        </#if>
    </@layout.registrationLayout>
    
  error.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayMessage=false; section>
        <#if section = "header">
            ${kcSanitize(msg("errorTitle"))?no_esc}
        <#elseif section = "form">
            <div class="alert alert-error">
                <#if message?? && message.summary??>
                    ${kcSanitize(message.summary)?no_esc}
                <#else>
                    ${msg("errorTitle")}
                </#if>
            </div>
            <#if skipLink??>
            <#else>
                <#if client?? && client.baseUrl?has_content>
                    <a href="${client.baseUrl}" class="btn-primary" style="display: block; text-align: center; text-decoration: none; line-height: 44px;">
                        ${msg("backToApplication")}
                    </a>
                </#if>
            </#if>
        </#if>
    </@layout.registrationLayout>
    
  info.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayMessage=false; section>
        <#if section = "header">
            <#if messageHeader??>
                ${kcSanitize(msg("${messageHeader}"))?no_esc}
            <#else>
                ${(message.summary)!''}
            </#if>
        <#elseif section = "form">
            <div class="alert alert-info">
                ${(message.summary)!''}
                <#if requiredActions??>
                    <#list requiredActions>
                        : <strong><#items as reqActionItem>${kcSanitize(msg("requiredAction.${reqActionItem}"))?no_esc}<#sep>, </#items></strong>
                    </#list>
                </#if>
            </div>
            <#if skipLink??>
            <#else>
                <#if pageRedirectUri?has_content>
                    <a href="${pageRedirectUri}" class="btn-primary" style="display: block; text-align: center; text-decoration: none; line-height: 44px;">
                        ${msg("backToApplication")}
                    </a>
                <#elseif actionUri?has_content>
                    <a href="${actionUri}" class="btn-primary" style="display: block; text-align: center; text-decoration: none; line-height: 44px;">
                        ${msg("proceedWithAction")}
                    </a>
                <#elseif (client.baseUrl)?has_content>
                    <a href="${client.baseUrl}" class="btn-primary" style="display: block; text-align: center; text-decoration: none; line-height: 44px;">
                        ${msg("backToApplication")}
                    </a>
                </#if>
            </#if>
        </#if>
    </@layout.registrationLayout>
    
  login.css: |
    /* ============================================================
       URFU Link — Keycloak Login Theme
       Dark design matching the main application
       ============================================================ */
    
    /* --- Tokens --- */
    :root {
      --bg-page: #080b14;
      --bg-card: #0f1320;
      --bg-input: #151928;
      --bg-input-focus: #1a1f32;
      --text-primary: #f0f2f5;
      --text-secondary: #8b95a8;
      --text-muted: #505a6e;
      --accent: #3b82f6;
      --accent-hover: #5b9aff;
      --accent-glow: rgba(59, 130, 246, 0.2);
      --border: rgba(255, 255, 255, 0.06);
      --border-input: rgba(255, 255, 255, 0.08);
      --border-input-focus: rgba(59, 130, 246, 0.5);
      --shadow-card: 0 4px 32px rgba(0, 0, 0, 0.4);
      --shadow-input-focus: 0 0 0 3px var(--accent-glow);
      --error-bg: rgba(239, 68, 68, 0.1);
      --error-border: rgba(239, 68, 68, 0.2);
      --error-text: #f87171;
      --success-bg: rgba(34, 197, 94, 0.1);
      --success-border: rgba(34, 197, 94, 0.2);
      --success-text: #4ade80;
      --warning-bg: rgba(234, 179, 8, 0.1);
      --warning-border: rgba(234, 179, 8, 0.2);
      --warning-text: #facc15;
      --info-bg: rgba(59, 130, 246, 0.1);
      --info-border: rgba(59, 130, 246, 0.2);
      --info-text: #60a5fa;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 150ms ease;
    }
    
    /* --- Reset --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-primary);
      background: var(--bg-page);
      line-height: 1.5;
      min-height: 100vh;
    }
    
    /* --- Background --- */
    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59, 130, 246, 0.08), transparent 60%),
        var(--bg-page);
    }
    
    .login-bg-grid { display: none; }
    
    /* --- Page Layout --- */
    .login-page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    
    /* --- Logo --- */
    .login-logo {
      margin-bottom: 40px;
      animation: fadeIn 0.5s ease-out;
    }
    
    .login-logo img {
      height: 40px;
      width: auto;
    }
    
    /* --- Card --- */
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-card);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* --- Card Header --- */
    .login-card-header {
      margin-bottom: 24px;
    }
    
    .login-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    
    .login-card-subtitle {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    
    /* --- Client Info --- */
    .login-footer-link {
      font-size: 0.6875rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color var(--transition);
    }
    
    .login-footer-link:hover {
      color: var(--accent);
    }
    
    /* --- Form --- */
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    
    .form-input {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      outline: none;
    }
    
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:hover { border-color: rgba(255, 255, 255, 0.12); }
    
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: var(--shadow-input-focus);
      background: var(--bg-input-focus);
    }
    
    .form-input[aria-invalid="true"] {
      border-color: var(--error-border);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }
    
    /* --- Password --- */
    .form-input-wrapper { position: relative; }
    .form-input-password .form-input { padding-right: 42px; }
    
    /* --- Input Error --- */
    .input-error {
      display: block;
      font-size: 0.75rem;
      color: var(--error-text);
      margin-top: 4px;
    }
    
    /* --- Form Actions (remember me + forgot) --- */
    .form-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .form-checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .form-checkbox-wrapper input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    
    .form-checkbox-wrapper label {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }
    
    /* --- Links --- */
    .form-link {
      font-size: 0.8125rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition);
    }
    
    .form-link:hover {
      color: var(--accent-hover);
    }
    
    /* --- Primary Button --- */
    .btn-primary {
      width: 100%;
      height: 42px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), transform 100ms ease, box-shadow var(--transition);
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    /* --- Secondary Button --- */
    .btn-secondary {
      width: 100%;
      height: 42px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
    }
    
    .btn-group { display: flex; gap: 10px; }
    .btn-group > * { flex: 1; }
    
    /* --- Alerts --- */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      line-height: 1.5;
      margin-bottom: 16px;
      border: 1px solid;
    }
    
    .alert-error { background: var(--error-bg); border-color: var(--error-border); color: var(--error-text); }
    .alert-success { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .alert-warning { background: var(--warning-bg); border-color: var(--warning-border); color: var(--warning-text); }
    .alert-info { background: var(--info-bg); border-color: var(--info-border); color: var(--info-text); }
    
    /* --- Info Block --- */
    .login-info {
      max-width: 400px;
      width: 100%;
      text-align: center;
      margin-top: 12px;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    
    .login-info a {
      color: var(--accent);
      text-decoration: none;
    }
    
    /* --- Footer --- */
    .login-footer {
      margin-top: 24px;
      text-align: center;
      animation: fadeIn 0.5s ease-out 0.2s both;
    }
    
    .login-footer-text {
      font-size: 0.6875rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    
    /* --- OTP --- */
    .otp-credentials { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    
    .otp-credential {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color var(--transition);
    }
    
    .otp-credential:hover { border-color: rgba(255, 255, 255, 0.12); }
    .otp-credential input[type="radio"] { accent-color: var(--accent); }
    .otp-credential.selected { border-color: var(--accent); }
    .otp-credential-label { font-size: 0.875rem; color: var(--text-primary); }
    
    /* --- TOTP --- */
    .totp-setup { text-align: center; }
    .totp-qr { display: inline-block; padding: 12px; background: #fff; border-radius: var(--radius-sm); margin: 12px 0; }
    .totp-secret { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.8125rem; color: var(--text-primary); background: var(--bg-input); border: 1px solid var(--border-input); border-radius: var(--radius-sm); padding: 8px 12px; word-break: break-all; margin: 10px 0; }
    .totp-params { font-size: 0.75rem; color: var(--text-muted); margin: 6px 0; }
    
    .instruction { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; }
    
    /* --- Animations --- */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* --- Mobile --- */
    @media (max-width: 480px) {
      .login-card { padding: 24px 20px; }
    }
    
    /* --- Kill default Keycloak chrome --- */
    #kc-header, #kc-header-wrapper, .pf-v5-c-brand, .pf-v5-c-login__header, .pf-v5-c-login__footer { display: none !important; }
    

apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: linkerd-viz
  labels:
    app.kubernetes.io/name: oauth2-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url=https://id.ghjc.ru/realms/urfu-link
            - --client-id=$(CLIENT_ID)
            - --client-secret=$(CLIENT_SECRET)
            - --cookie-secret=$(COOKIE_SECRET)
            - --cookie-secure=true
            - --cookie-name=_linkerd_viz_oauth2
            - --http-address=0.0.0.0:4180
            - --upstream=static://200
            - --email-domain=*
            - --skip-provider-button=true
            - --redirect-url=https://linkerd.ghjc.ru/oauth2/callback
            - --allowed-role=realm:admin
            - --scope=openid email profile roles
            - --code-challenge-method=S256
            - --silence-ping-logging=true
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: linkerd-viz-oauth2
                  key: client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkerd-viz-oauth2
                  key: client-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkerd-viz-oauth2
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: linkerd-viz
  labels:
    app.kubernetes.io/name: oauth2-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app.kubernetes.io/name: oauth2-proxy
  ports:
    - port: 4180
      targetPort: http
      protocol: TCP
      name: http

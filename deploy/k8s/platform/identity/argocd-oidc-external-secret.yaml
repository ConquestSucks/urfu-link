apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: argocd-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        oidc.keycloak.clientSecret: '{{ .client_secret }}'
  data:
    - secretKey: client_secret
      remoteRef:
        key: urfu-link/prod/argocd
        property: client_secret

apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-init
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-init
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-init
subjects:
  - kind: ServiceAccount
    name: vault-init
    namespace: vault
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  template:
    spec:
      serviceAccountName: vault-init
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: hashicorp/vault:1.21.4
          env:
            - name: VAULT_ADDR
              value: "http://vault-internal.vault.svc.cluster.local:8200"
          command:
            - "/bin/sh"
            - "-c"
            - |
              set -eu

              ensure_curl() {
                if command -v curl >/dev/null 2>&1; then
                  return 0
                fi

                if command -v apk >/dev/null 2>&1; then
                  apk add --no-cache curl >/dev/null
                  return 0
                fi

                echo "curl is required but unavailable"
                exit 1
              }

              ensure_curl

              json_get_string() {
                echo "$1" | tr -d '\r\n' | sed -n "s/.*\"$2\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p"
              }

              json_get_first_array_string() {
                echo "$1" | tr -d '\r\n' | sed -n "s/.*\"$2\"[[:space:]]*:[[:space:]]*\[[[:space:]]*\"\([^\"]*\)\".*/\1/p"
              }

              wait_for_vault_status() {
                while true; do
                  STATUS_JSON="$(vault status -format=json 2>/dev/null || true)"

                  if echo "$STATUS_JSON" | grep -Eq '"initialized":[[:space:]]*false'; then
                    echo "false"
                    return 0
                  fi

                  if echo "$STATUS_JSON" | grep -Eq '"initialized":[[:space:]]*true'; then
                    echo "true"
                    return 0
                  fi

                  sleep 2
                done
              }

              configure_vault() {
                if ! vault auth list -format=json | grep -q '"kubernetes/"'; then
                  vault auth enable kubernetes
                fi

                vault write auth/kubernetes/config \
                    kubernetes_host="https://kubernetes.default.svc" \
                    kubernetes_ca_cert="@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

                if ! vault secrets list -format=json | grep -q '"kv/"'; then
                  vault secrets enable -path=kv kv-v2
                fi

                vault policy write external-secrets - <<EOF_POL
              path "kv/data/*" {
                capabilities = ["read", "list"]
              }
              path "kv/metadata/*" {
                capabilities = ["read", "list"]
              }
              EOF_POL

                vault policy write minio-bootstrap - <<EOF_POL
              path "kv/data/urfu-link/prod/minio" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/metadata/urfu-link/prod/minio" {
                capabilities = ["read", "list"]
              }
              EOF_POL

                vault policy write platform-bootstrap - <<EOF_POL
              path "kv/data/urfu-link/prod/keycloak" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/user-service" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/media-service" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/chat-service" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/presence-service" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/notification-service" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/call-service" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/api-gateway" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/kafka" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/grafana" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/linkerd-viz" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/mongo-backup" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/minio" {
                capabilities = ["read"]
              }
              path "kv/metadata/urfu-link/prod/*" {
                capabilities = ["read", "list"]
              }
              EOF_POL

                vault policy write keycloak-bootstrap - <<EOF_POL
              path "kv/data/urfu-link/prod/frontend-web-oauth2" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/linkerd-viz" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/headlamp" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/argocd" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/vault-oidc" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/grafana-oidc" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/minio-oidc" {
                capabilities = ["create", "update", "read"]
              }
              path "kv/data/urfu-link/prod/keycloak" {
                capabilities = ["read"]
              }
              path "kv/metadata/urfu-link/prod/*" {
                capabilities = ["read", "list"]
              }
              path "auth/oidc/*" {
                capabilities = ["create", "update", "read"]
              }
              path "sys/auth" {
                capabilities = ["read"]
              }
              path "sys/auth/oidc" {
                capabilities = ["create", "update", "sudo"]
              }
              EOF_POL

                vault policy write vault-admin - <<EOF_POL
              path "*" {
                capabilities = ["create", "read", "update", "delete", "list", "sudo"]
              }
              EOF_POL

                if ! vault auth list -format=json | grep -q '"oidc/"'; then
                  echo "Enabling OIDC auth method..."
                  vault auth enable oidc
                fi

                vault write auth/oidc/config \
                    oidc_discovery_url="https://id.ghjc.ru/realms/urfu-link" \
                    oidc_client_id="vault-oidc" \
                    oidc_client_secret="placeholder" \
                    default_role="admin"

                vault write auth/oidc/role/admin \
                    bound_audiences="vault-oidc" \
                    allowed_redirect_uris="https://vault.ghjc.ru/ui/vault/auth/oidc/oidc/callback" \
                    allowed_redirect_uris="http://localhost:8250/oidc/callback" \
                    user_claim="preferred_username" \
                    groups_claim="groups" \
                    oidc_scopes="openid,profile,email,roles" \
                    token_policies="vault-admin" \
                    ttl=8h

                vault write auth/kubernetes/role/urfu-link-prod \
                    bound_service_account_names=external-secrets \
                    bound_service_account_namespaces=external-secrets \
                    policies=external-secrets \
                    ttl=24h

                vault write auth/kubernetes/role/minio-bootstrap \
                    bound_service_account_names=minio-bootstrap \
                    bound_service_account_namespaces=urfu-platform \
                    policies=minio-bootstrap \
                    ttl=24h

                vault write auth/kubernetes/role/platform-bootstrap \
                    bound_service_account_names=platform-bootstrap \
                    bound_service_account_namespaces=urfu-platform \
                    policies=platform-bootstrap \
                    ttl=24h

                vault write auth/kubernetes/role/keycloak-bootstrap \
                    bound_service_account_names=keycloak-bootstrap \
                    bound_service_account_namespaces=urfu-platform \
                    policies=keycloak-bootstrap \
                    ttl=24h
              }

              echo "Waiting for vault to be ready..."
              VAULT_INITIALIZED="$(wait_for_vault_status)"
              
              if [ "$VAULT_INITIALIZED" = "false" ]; then
                echo "Initializing Vault..."
                vault operator init -key-shares=1 -key-threshold=1 -format=json > /tmp/init.json

                INIT_JSON="$(cat /tmp/init.json)"
                ROOT_TOKEN="$(json_get_string "$INIT_JSON" root_token)"
                UNSEAL_KEY="$(json_get_first_array_string "$INIT_JSON" unseal_keys_b64)"

                if [ -z "$ROOT_TOKEN" ] || [ -z "$UNSEAL_KEY" ]; then
                  echo "Could not parse Vault init output."
                  exit 1
                fi
                
                echo "Creating Kubernetes Secret with Vault credentials..."
                cat <<EOF > /tmp/secret.yaml
              apiVersion: v1
              kind: Secret
              metadata:
                name: vault-keys
                namespace: vault
              type: Opaque
              stringData:
                root_token: "$ROOT_TOKEN"
                unseal_key: "$UNSEAL_KEY"
              EOF
                
                # We use kubectl image here to apply the secret
                # But since we are in vault image, we'll use curl to API server
                APISERVER=https://kubernetes.default.svc
                SERVICEACCOUNT=/var/run/secrets/kubernetes.io/serviceaccount
                TOKEN=$(cat ${SERVICEACCOUNT}/token)
                CACERT=${SERVICEACCOUNT}/ca.crt

                curl --silent --output /dev/null --cacert ${CACERT} --header "Authorization: Bearer ${TOKEN}" \
                     -X DELETE ${APISERVER}/api/v1/namespaces/vault/secrets/vault-keys || true

                curl --fail --silent --show-error --cacert ${CACERT} --header "Authorization: Bearer ${TOKEN}" \
                     -X POST ${APISERVER}/api/v1/namespaces/vault/secrets \
                     -H 'Accept: application/json' -H 'Content-Type: application/json' \
                     -d "{
                       \"apiVersion\": \"v1\",
                       \"kind\": \"Secret\",
                       \"metadata\": { \"name\": \"vault-keys\" },
                       \"stringData\": {
                         \"root_token\": \"$ROOT_TOKEN\",
                         \"unseal_key\": \"$UNSEAL_KEY\"
                       }
                     }"
                
                echo "Unsealing Vault..."
                vault operator unseal "$UNSEAL_KEY"
                
                export VAULT_TOKEN="$ROOT_TOKEN"
                echo "Setting up Kubernetes Auth Method..."
                echo "Creating kv KV engine v2..."
                echo "Creating External Secrets policy..."
                echo "Binding policy to role..."
                configure_vault

                echo "Revoking root token and removing from vault-keys secret..."
                vault token revoke -self || true
                curl --silent --cacert "${CACERT}" \
                  --header "Authorization: Bearer ${TOKEN}" \
                  --header "Content-Type: application/strategic-merge-patch+json" \
                  --request PATCH \
                  -d '{"data":{"root_token":null}}' \
                  "${APISERVER}/api/v1/namespaces/vault/secrets/vault-keys" >/dev/null || true

                echo "Vault initialization and configuration complete!"
              else
                echo "Vault is already initialized."
                APISERVER=https://kubernetes.default.svc
                SERVICEACCOUNT=/var/run/secrets/kubernetes.io/serviceaccount
                TOKEN=$(cat ${SERVICEACCOUNT}/token)
                CACERT=${SERVICEACCOUNT}/ca.crt

                RESPONSE=$(curl --silent --cacert ${CACERT} --header "Authorization: Bearer ${TOKEN}" \
                     -X GET ${APISERVER}/api/v1/namespaces/vault/secrets/vault-keys)

                UNSEAL_KEY_B64="$(json_get_string "$RESPONSE" unseal_key)"

                if [ -z "$UNSEAL_KEY_B64" ]; then
                  echo "Could not find vault-keys secret. Cannot proceed."
                  exit 1
                fi

                UNSEAL_KEY=$(echo "$UNSEAL_KEY_B64" | base64 -d)

                if vault status -format=json 2>/dev/null | grep -Eq '"sealed":[[:space:]]*true'; then
                  echo "Unsealing Vault..."
                  vault operator unseal "$UNSEAL_KEY"
                else
                  echo "Vault is already unsealed."
                fi

                echo "Generating new root token for reconfiguration..."
                INIT_JSON="$(vault operator generate-root -init -format=json)"
                OTP="$(echo "$INIT_JSON" | sed -n 's/.*"otp"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
                NONCE="$(echo "$INIT_JSON" | sed -n 's/.*"nonce"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"

                PROVIDE_JSON="$(vault operator generate-root -nonce="$NONCE" -format=json "$UNSEAL_KEY")"
                ENCODED_TOKEN="$(echo "$PROVIDE_JSON" | sed -n 's/.*"encoded_root_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"

                DECODE_JSON="$(vault operator generate-root -decode="$ENCODED_TOKEN" -otp="$OTP" -format=json)"
                ROOT_TOKEN="$(echo "$DECODE_JSON" | sed -n 's/.*"token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"

                if [ -z "$ROOT_TOKEN" ]; then
                  echo "Failed to generate root token."
                  exit 1
                fi

                export VAULT_TOKEN="$ROOT_TOKEN"
                echo "Reconfiguring Vault policies and roles..."
                configure_vault

                echo "Revoking root token..."
                vault token revoke -self || true
              fi

apiVersion: policy.linkerd.io/v1beta1
kind: MeshTLSAuthentication
metadata:
  name: cluster-authenticated
  namespace: urfu-prod
spec:
  identities:
    - "*.urfu-prod.serviceaccount.identity.linkerd.cluster.local"
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: media-service
  namespace: urfu-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: media-service
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: media-service-allow-mtls
  namespace: urfu-prod
spec:
  server:
    name: media-service
  client:
    meshTLS:
      identities:
        - "*.urfu-prod.serviceaccount.identity.linkerd.cluster.local"
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console
  namespace: urfu-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - minio.ghjc.ru
      secretName: minio-ghjc-ru-tls
  rules:
    - host: minio.ghjc.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: urfu-minio
                port:
                  number: 9001
---
# Public read-only API endpoint for object storage (avatar images, media).
# Services write via internal urfu-minio.urfu-platform.svc.cluster.local:9000;
# browsers download from https://storage.ghjc.ru/<bucket>/<key>.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-api
  namespace: urfu-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - storage.ghjc.ru
      secretName: storage-ghjc-ru-tls
  rules:
    - host: storage.ghjc.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: urfu-minio
                port:
                  number: 9000

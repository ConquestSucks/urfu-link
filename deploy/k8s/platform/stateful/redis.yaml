apiVersion: apps/v1
kind: Deployment
metadata:
  name: urfu-redis
  namespace: urfu-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: urfu-redis
  template:
    metadata:
      labels:
        app: urfu-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: redis
          image: redis:7.4.2-alpine
          ports:
            - containerPort: 6379
              name: redis
          args: ["--save", "", "--appendonly", "no"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: urfu-redis
  namespace: urfu-platform
spec:
  selector:
    app: urfu-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis

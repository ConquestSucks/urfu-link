apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: urfu-kafka
  namespace: urfu-platform
spec:
  serviceName: urfu-kafka-hl
  replicas: 1
  selector:
    matchLabels:
      app: urfu-kafka
  template:
    metadata:
      labels:
        app: urfu-kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.0.2
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://urfu-kafka-0.urfu-kafka-hl.urfu-platform.svc.cluster.local:9092
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 1536Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 60
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: urfu-kafka
  namespace: urfu-platform
spec:
  selector:
    app: urfu-kafka
  ports:
    - name: broker
      port: 9092
      targetPort: broker
---
apiVersion: v1
kind: Service
metadata:
  name: urfu-kafka-hl
  namespace: urfu-platform
spec:
  clusterIP: None
  selector:
    app: urfu-kafka
  ports:
    - name: broker
      port: 9092
      targetPort: broker
    - name: controller
      port: 9093
      targetPort: controller

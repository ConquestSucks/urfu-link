apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: urfu-minio
  namespace: urfu-platform
spec:
  serviceName: urfu-minio-hl
  replicas: 1
  selector:
    matchLabels:
      app: urfu-minio
  template:
    metadata:
      labels:
        app: urfu-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: urfu-minio-env-config
                  key: root_user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: urfu-minio-env-config
                  key: root_password
            - name: MINIO_BROWSER_REDIRECT_URL
              value: "https://minio.ghjc.ru"
            - name: MINIO_IDENTITY_OPENID_CONFIG_URL_KEYCLOAK
              value: "https://id.ghjc.ru/realms/urfu-link/.well-known/openid-configuration"
            - name: MINIO_IDENTITY_OPENID_CLIENT_ID_KEYCLOAK
              valueFrom:
                secretKeyRef:
                  name: minio-oidc
                  key: client_id
            - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET_KEYCLOAK
              valueFrom:
                secretKeyRef:
                  name: minio-oidc
                  key: client_secret
            - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME_KEYCLOAK
              value: "Keycloak SSO"
            - name: MINIO_IDENTITY_OPENID_CLAIM_NAME_KEYCLOAK
              value: "groups"
            - name: MINIO_IDENTITY_OPENID_SCOPES_KEYCLOAK
              value: "openid,profile,email,roles"
            - name: MINIO_IDENTITY_OPENID_REDIRECT_URI_KEYCLOAK
              value: "https://minio.ghjc.ru/oauth_callback"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 20
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: urfu-minio
  namespace: urfu-platform
spec:
  selector:
    app: urfu-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: v1
kind: Service
metadata:
  name: urfu-minio-hl
  namespace: urfu-platform
spec:
  clusterIP: None
  selector:
    app: urfu-minio
  ports:
    - name: api
      port: 9000
      targetPort: api

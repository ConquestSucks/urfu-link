apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-bootstrap
subjects:
  - kind: ServiceAccount
    name: platform-bootstrap
    namespace: urfu-platform
---
apiVersion: batch/v1
kind: Job
metadata:
  name: platform-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    spec:
      serviceAccountName: platform-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: platform-bootstrap
          image: postgres:17.9-alpine
          env:
            - name: VAULT_ADDR
              value: "http://vault-internal.vault.svc.cluster.local:8200"
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if ! command -v curl >/dev/null 2>&1; then
                apk add --no-cache curl >/dev/null
              fi

              APISERVER="https://kubernetes.default.svc"
              SERVICEACCOUNT="/var/run/secrets/kubernetes.io/serviceaccount"
              TOKEN="$(cat "${SERVICEACCOUNT}/token")"
              CACERT="${SERVICEACCOUNT}/ca.crt"

              rand() {
                tr -dc 'A-Za-z0-9' </dev/urandom | head -c "$1"
              }

              b64() {
                printf "%s" "$1" | base64 | tr -d '\r\n'
              }

              json_get_string() {
                echo "$1" | tr -d '\r\n' | sed -n "s/.*\"$2\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p"
              }

              get_secret_json() {
                curl --silent --cacert "${CACERT}" \
                  --header "Authorization: Bearer ${TOKEN}" \
                  "${APISERVER}/api/v1/namespaces/urfu-platform/secrets/$1" || true
              }

              secret_http_code() {
                curl --silent --output /dev/null --write-out "%{http_code}" --cacert "${CACERT}" \
                  --header "Authorization: Bearer ${TOKEN}" \
                  "${APISERVER}/api/v1/namespaces/urfu-platform/secrets/$1" || true
              }

              create_secret_json() {
                curl --fail --silent --show-error --cacert "${CACERT}" \
                  --header "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/json" \
                  -H "Content-Type: application/json" \
                  -X POST "${APISERVER}/api/v1/namespaces/urfu-platform/secrets" \
                  -d "$1" >/dev/null
              }

              patch_secret_json() {
                curl --fail --silent --show-error --cacert "${CACERT}" \
                  --header "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/json" \
                  -H "Content-Type: application/merge-patch+json" \
                  -X PATCH "${APISERVER}/api/v1/namespaces/urfu-platform/secrets/$1" \
                  -d "$2" >/dev/null
              }

              secret_value() {
                RAW="$(json_get_string "$1" "$2")"
                if [ -z "$RAW" ]; then
                  return 1
                fi
                printf "%s" "$RAW" | base64 -d
              }

              ensure_generated_secret() {
                GENERATED_JSON="$(get_secret_json platform-bootstrap-generated)"
                GENERATED_CODE="$(secret_http_code platform-bootstrap-generated)"
                if [ "$GENERATED_CODE" = "404" ]; then
                  GENERATED_EXISTS="false"
                else
                  GENERATED_EXISTS="true"
                fi

                USER_DB_PASSWORD="$(secret_value "$GENERATED_JSON" user_db_password 2>/dev/null || true)"
                MEDIA_DB_PASSWORD="$(secret_value "$GENERATED_JSON" media_db_password 2>/dev/null || true)"
                KEYCLOAK_DB_PASSWORD="$(secret_value "$GENERATED_JSON" keycloak_db_password 2>/dev/null || true)"
                KEYCLOAK_ADMIN_PASSWORD="$(secret_value "$GENERATED_JSON" keycloak_admin_password 2>/dev/null || true)"
                API_GATEWAY_CLIENT_SECRET="$(secret_value "$GENERATED_JSON" api_gateway_client_secret 2>/dev/null || true)"

                [ -n "$USER_DB_PASSWORD" ] || USER_DB_PASSWORD="$(rand 32)"
                [ -n "$MEDIA_DB_PASSWORD" ] || MEDIA_DB_PASSWORD="$(rand 32)"
                [ -n "$KEYCLOAK_DB_PASSWORD" ] || KEYCLOAK_DB_PASSWORD="$(rand 32)"
                [ -n "$KEYCLOAK_ADMIN_PASSWORD" ] || KEYCLOAK_ADMIN_PASSWORD="$(rand 32)"
                [ -n "$API_GATEWAY_CLIENT_SECRET" ] || API_GATEWAY_CLIENT_SECRET="$(rand 40)"

                GENERATED_PATCH="$(printf '{"data":{"user_db_password":"%s","media_db_password":"%s","keycloak_db_password":"%s","keycloak_admin_password":"%s","api_gateway_client_secret":"%s"}}' \
                  "$(b64 "$USER_DB_PASSWORD")" \
                  "$(b64 "$MEDIA_DB_PASSWORD")" \
                  "$(b64 "$KEYCLOAK_DB_PASSWORD")" \
                  "$(b64 "$KEYCLOAK_ADMIN_PASSWORD")" \
                  "$(b64 "$API_GATEWAY_CLIENT_SECRET")")"

                if [ "$GENERATED_EXISTS" = "true" ]; then
                  patch_secret_json platform-bootstrap-generated "$GENERATED_PATCH"
                else
                  GENERATED_CREATE="$(printf '{"apiVersion":"v1","kind":"Secret","metadata":{"name":"platform-bootstrap-generated"},"type":"Opaque","data":{"user_db_password":"%s","media_db_password":"%s","keycloak_db_password":"%s","keycloak_admin_password":"%s","api_gateway_client_secret":"%s"}}' \
                    "$(b64 "$USER_DB_PASSWORD")" \
                    "$(b64 "$MEDIA_DB_PASSWORD")" \
                    "$(b64 "$KEYCLOAK_DB_PASSWORD")" \
                    "$(b64 "$KEYCLOAK_ADMIN_PASSWORD")" \
                    "$(b64 "$API_GATEWAY_CLIENT_SECRET")")"
                  create_secret_json "$GENERATED_CREATE"
                fi
              }

              ensure_mongo_password_secret() {
                MONGO_JSON="$(get_secret_json mongo-app-user-password)"
                MONGO_CODE="$(secret_http_code mongo-app-user-password)"
                if [ "$MONGO_CODE" = "404" ]; then
                  MONGO_APP_PASSWORD="$(rand 32)"
                  MONGO_CREATE="$(printf '{"apiVersion":"v1","kind":"Secret","metadata":{"name":"mongo-app-user-password"},"type":"Opaque","data":{"password":"%s"}}' "$(b64 "$MONGO_APP_PASSWORD")")"
                  create_secret_json "$MONGO_CREATE"
                else
                  MONGO_APP_PASSWORD="$(secret_value "$MONGO_JSON" password 2>/dev/null || true)"
                  if [ -z "$MONGO_APP_PASSWORD" ]; then
                    MONGO_APP_PASSWORD="$(rand 32)"
                    MONGO_PATCH="$(printf '{"data":{"password":"%s"}}' "$(b64 "$MONGO_APP_PASSWORD")")"
                    patch_secret_json mongo-app-user-password "$MONGO_PATCH"
                  fi
                fi
              }

              wait_for_postgres_superuser() {
                while true; do
                  POSTGRES_SECRET_JSON="$(get_secret_json urfu-postgres-superuser)"
                  POSTGRES_PASSWORD="$(secret_value "$POSTGRES_SECRET_JSON" password 2>/dev/null || true)"
                  if [ -n "$POSTGRES_PASSWORD" ]; then
                    POSTGRES_USER="$(secret_value "$POSTGRES_SECRET_JSON" username 2>/dev/null || true)"
                    [ -n "$POSTGRES_USER" ] || POSTGRES_USER="postgres"
                    return 0
                  fi
                  sleep 5
                done
              }

              pg_exec() {
                PGPASSWORD="$POSTGRES_PASSWORD" psql -v ON_ERROR_STOP=1 \
                  -h urfu-postgres-rw.urfu-platform.svc.cluster.local \
                  -U "$POSTGRES_USER" \
                  -d postgres \
                  -c "$1" >/dev/null
              }

              bootstrap_postgres() {
                until PGPASSWORD="$POSTGRES_PASSWORD" pg_isready \
                  -h urfu-postgres-rw.urfu-platform.svc.cluster.local \
                  -U "$POSTGRES_USER" \
                  -d postgres >/dev/null 2>&1; do
                  sleep 3
                done

                pg_exec "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'user') THEN CREATE ROLE \"user\" LOGIN PASSWORD '$USER_DB_PASSWORD'; ELSE ALTER ROLE \"user\" WITH LOGIN PASSWORD '$USER_DB_PASSWORD'; END IF; END \$\$;"
                pg_exec "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'media') THEN CREATE ROLE \"media\" LOGIN PASSWORD '$MEDIA_DB_PASSWORD'; ELSE ALTER ROLE \"media\" WITH LOGIN PASSWORD '$MEDIA_DB_PASSWORD'; END IF; END \$\$;"
                pg_exec "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'keycloak') THEN CREATE ROLE keycloak LOGIN PASSWORD '$KEYCLOAK_DB_PASSWORD'; ELSE ALTER ROLE keycloak WITH LOGIN PASSWORD '$KEYCLOAK_DB_PASSWORD'; END IF; END \$\$;"

                if ! PGPASSWORD="$POSTGRES_PASSWORD" psql -At \
                  -h urfu-postgres-rw.urfu-platform.svc.cluster.local \
                  -U "$POSTGRES_USER" \
                  -d postgres \
                  -c "SELECT 1 FROM pg_database WHERE datname = 'user_db'" | grep -q 1; then
                  pg_exec "CREATE DATABASE user_db OWNER \"user\""
                fi

                if ! PGPASSWORD="$POSTGRES_PASSWORD" psql -At \
                  -h urfu-postgres-rw.urfu-platform.svc.cluster.local \
                  -U "$POSTGRES_USER" \
                  -d postgres \
                  -c "SELECT 1 FROM pg_database WHERE datname = 'media_db'" | grep -q 1; then
                  pg_exec "CREATE DATABASE media_db OWNER \"media\""
                fi

                if ! PGPASSWORD="$POSTGRES_PASSWORD" psql -At \
                  -h urfu-postgres-rw.urfu-platform.svc.cluster.local \
                  -U "$POSTGRES_USER" \
                  -d postgres \
                  -c "SELECT 1 FROM pg_database WHERE datname = 'keycloak'" | grep -q 1; then
                  pg_exec "CREATE DATABASE keycloak OWNER keycloak"
                fi
              }

              wait_for_vault() {
                while true; do
                  STATUS_JSON="$(curl --silent "${VAULT_ADDR}/v1/sys/health" || true)"
                  if echo "$STATUS_JSON" | grep -Eq '"initialized"[[:space:]]*:[[:space:]]*true' &&
                     echo "$STATUS_JSON" | grep -Eq '"sealed"[[:space:]]*:[[:space:]]*false'; then
                    return 0
                  fi
                  sleep 3
                done
              }

              vault_login() {
                LOGIN_RESPONSE="$(curl --silent \
                  --request POST \
                  --data "{\"role\":\"platform-bootstrap\",\"jwt\":\"$(cat "${SERVICEACCOUNT}/token")\"}" \
                  "${VAULT_ADDR}/v1/auth/kubernetes/login")"
                VAULT_TOKEN="$(json_get_string "$LOGIN_RESPONSE" client_token)"
                [ -n "$VAULT_TOKEN" ]
              }

              vault_put() {
                curl --fail --silent --show-error \
                  --header "X-Vault-Token: ${VAULT_TOKEN}" \
                  --header "Content-Type: application/json" \
                  --request POST \
                  --data "$2" \
                  "${VAULT_ADDR}/v1/kv/data/$1" >/dev/null
              }

              ensure_generated_secret
              ensure_mongo_password_secret
              wait_for_postgres_superuser
              bootstrap_postgres
              wait_for_vault
              vault_login

              KEYCLOAK_PAYLOAD="$(printf '{"data":{"admin_username":"admin","admin_password":"%s","db_host":"urfu-postgres-rw.urfu-platform.svc.cluster.local","db_name":"keycloak","db_username":"keycloak","db_password":"%s"}}' "$KEYCLOAK_ADMIN_PASSWORD" "$KEYCLOAK_DB_PASSWORD")"
              USER_PAYLOAD="$(printf '{"data":{"primary_connection":"Host=urfu-postgres-rw.urfu-platform.svc.cluster.local;Port=5432;Database=user_db;Username=user;Password=%s"}}' "$USER_DB_PASSWORD")"
              MEDIA_PAYLOAD="$(printf '{"data":{"primary_connection":"Host=urfu-postgres-rw.urfu-platform.svc.cluster.local;Port=5432;Database=media_db;Username=media;Password=%s"}}' "$MEDIA_DB_PASSWORD")"
              CHAT_PAYLOAD="$(printf '{"data":{"primary_connection":"mongodb://app-user:%s@urfu-mongo-svc.urfu-platform.svc.cluster.local:27017/chat_db?authSource=admin"}}' "$MONGO_APP_PASSWORD")"
              PRESENCE_PAYLOAD='{"data":{"primary_connection":"urfu-redis-leader.urfu-platform.svc.cluster.local:6379"}}'
              NOTIFICATION_PAYLOAD='{"data":{"kafka_bootstrap_servers":"urfu-kafka-kafka-bootstrap.urfu-platform.svc.cluster.local:9092"}}'
              CALL_PAYLOAD='{"data":{"kafka_bootstrap_servers":"urfu-kafka-kafka-bootstrap.urfu-platform.svc.cluster.local:9092"}}'
              API_GATEWAY_PAYLOAD="$(printf '{"data":{"auth_client_secret":"%s"}}' "$API_GATEWAY_CLIENT_SECRET")"

              vault_put urfu-link/prod/keycloak "$KEYCLOAK_PAYLOAD"
              vault_put urfu-link/prod/user-service "$USER_PAYLOAD"
              vault_put urfu-link/prod/media-service "$MEDIA_PAYLOAD"
              vault_put urfu-link/prod/chat-service "$CHAT_PAYLOAD"
              vault_put urfu-link/prod/presence-service "$PRESENCE_PAYLOAD"
              vault_put urfu-link/prod/notification-service "$NOTIFICATION_PAYLOAD"
              vault_put urfu-link/prod/call-service "$CALL_PAYLOAD"
              vault_put urfu-link/prod/api-gateway "$API_GATEWAY_PAYLOAD"

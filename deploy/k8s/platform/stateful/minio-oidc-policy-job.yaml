apiVersion: batch/v1
kind: Job
metadata:
  name: minio-oidc-policy
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
    argocd.argoproj.io/sync-wave: "3"
spec:
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-oidc-policy
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z
          env:
            - name: MINIO_ENDPOINT
              value: "http://urfu-minio.urfu-platform.svc.cluster.local:9000"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: urfu-minio-env-config
                  key: root_user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: urfu-minio-env-config
                  key: root_password
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: minio-oidc
                  key: client_id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-oidc
                  key: client_secret
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              echo "Waiting for MinIO..."
              until mc alias set myminio "${MINIO_ENDPOINT}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
                sleep 5
              done
              echo "MinIO is ready."

              echo "Attaching consoleAdmin policy to admin group..."
              mc admin policy attach myminio consoleAdmin --group="admin" || true

              echo "Configuring Keycloak OIDC provider..."
              mc idp openid remove myminio keycloak 2>/dev/null || true
              mc idp openid add myminio keycloak \
                config_url="https://id.ghjc.ru/realms/urfu-link/.well-known/openid-configuration" \
                client_id="${OIDC_CLIENT_ID}" \
                client_secret="${OIDC_CLIENT_SECRET}" \
                claim_name="groups" \
                display_name="Keycloak SSO" \
                scopes="openid,profile,email,roles" \
                redirect_uri="https://minio.ghjc.ru/oauth_callback"

              echo "Restarting MinIO to apply OIDC config..."
              mc admin service restart myminio

              echo "Waiting for MinIO to come back..."
              sleep 10
              until mc alias set myminio "${MINIO_ENDPOINT}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
                sleep 5
              done

              echo "MinIO OIDC policy configuration complete!"

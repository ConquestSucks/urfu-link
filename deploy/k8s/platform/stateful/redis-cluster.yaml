apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: urfu-redis
  namespace: urfu-platform
spec:
  kubernetesConfig:
    image: redis:7.4.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: fast-ssd
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
  redisExporter:
    enabled: false

apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: urfu-mongo
  namespace: urfu-platform
spec:
  members: 3
  type: ReplicaSet
  version: "8.0.5"
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: app-user
      db: admin
      passwordSecretRef:
        name: mongo-app-user-password
      roles:
        - name: readWriteAnyDatabase
          db: admin
      scramCredentialsSecretName: app-user-scram
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 100Gi
            storageClassName: fast-ssd

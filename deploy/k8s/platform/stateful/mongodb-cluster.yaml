apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: urfu-mongo
  namespace: urfu-platform
spec:
  members: 1
  type: ReplicaSet
  version: "8.0.5"
  security:
    authentication:
      modes: ["SCRAM"]
    tls:
      enabled: false
  users:
    - name: app-user
      db: admin
      passwordSecretRef:
        name: mongo-app-user-password
      roles:
        - name: readWrite
          db: chat_db
        - name: readWrite
          db: call_db
        - name: readWrite
          db: presence_db
      scramCredentialsSecretName: app-user-scram
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 2000m
                  memory: 4Gi
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 100Gi
            storageClassName: fast-ssd

apiVersion: v1
kind: Secret
metadata:
  name: mongo-app-user-password
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  password: "PLACEHOLDER_WILL_BE_REPLACED_BY_BOOTSTRAP"
---
apiVersion: v1
kind: Service
metadata:
  name: urfu-mongo-svc
  namespace: urfu-platform
spec:
  clusterIP: None
  selector:
    app: urfu-mongo
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: urfu-mongo
  namespace: urfu-platform
spec:
  serviceName: urfu-mongo-svc
  replicas: 1
  selector:
    matchLabels:
      app: urfu-mongo
  template:
    metadata:
      labels:
        app: urfu-mongo
    spec:
      containers:
        - name: mongod
          image: mongo:8.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: app-user
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-app-user-password
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 10Gi

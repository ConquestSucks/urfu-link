apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: urfu-postgres
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  instances: 1
  enableSuperuserAccess: true
  storage:
    size: 100Gi
    storageClass: fast-ssd
  backup:
    retentionPolicy: "14d"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  postgresql:
    parameters:
      shared_buffers: "512MB"

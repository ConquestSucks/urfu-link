apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minio-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minio-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: minio-bootstrap
subjects:
  - kind: ServiceAccount
    name: minio-bootstrap
    namespace: urfu-platform
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap
  namespace: urfu-platform
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    spec:
      serviceAccountName: minio-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: minio-bootstrap
          image: hashicorp/vault:1.16.2
          env:
            - name: VAULT_ADDR
              value: "http://vault-internal.vault.svc.cluster.local:8200"
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              ensure_curl() {
                if command -v curl >/dev/null 2>&1; then
                  return 0
                fi

                if command -v apk >/dev/null 2>&1; then
                  apk add --no-cache curl >/dev/null
                  return 0
                fi

                echo "curl is required but unavailable"
                exit 1
              }

              rand() {
                tr -dc 'A-Za-z0-9' </dev/urandom | head -c "$1"
              }

              json_get_string() {
                echo "$1" | tr -d '\r\n' | sed -n "s/.*\"$2\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p"
              }

              wait_for_vault() {
                while true; do
                  STATUS_JSON="$(vault status -format=json 2>/dev/null || true)"

                  if echo "$STATUS_JSON" | grep -Eq '"initialized":[[:space:]]*true' &&
                     echo "$STATUS_JSON" | grep -Eq '"sealed":[[:space:]]*false'; then
                    return 0
                  fi

                  sleep 2
                done
              }

              ensure_curl

              APISERVER=https://kubernetes.default.svc
              SERVICEACCOUNT=/var/run/secrets/kubernetes.io/serviceaccount
              TOKEN=$(cat ${SERVICEACCOUNT}/token)
              CACERT=${SERVICEACCOUNT}/ca.crt

              SECRET_RESPONSE="$(curl --silent --cacert ${CACERT} --header "Authorization: Bearer ${TOKEN}" \
                   -X GET ${APISERVER}/api/v1/namespaces/urfu-platform/secrets/urfu-minio-env-config || true)"
              CONFIG_ENV_B64="$(json_get_string "$SECRET_RESPONSE" "config.env")"

              if [ -n "$CONFIG_ENV_B64" ]; then
                CONFIG_ENV="$(echo "$CONFIG_ENV_B64" | base64 -d)"
                MINIO_ROOT_USER="$(echo "$CONFIG_ENV" | sed -n 's/^export MINIO_ROOT_USER=//p')"
                MINIO_ROOT_PASSWORD="$(echo "$CONFIG_ENV" | sed -n 's/^export MINIO_ROOT_PASSWORD=//p')"
              else
                MINIO_ROOT_USER="urfu$(rand 16)"
                MINIO_ROOT_PASSWORD="$(rand 40)"
                CONFIG_ENV="$(printf "export MINIO_ROOT_USER=%s\nexport MINIO_ROOT_PASSWORD=%s\n" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD")"
                CONFIG_ENV_B64="$(printf "%s" "$CONFIG_ENV" | base64 | tr -d '\r\n')"

                curl --fail --silent --show-error --cacert ${CACERT} --header "Authorization: Bearer ${TOKEN}" \
                     -X POST ${APISERVER}/api/v1/namespaces/urfu-platform/secrets \
                     -H 'Accept: application/json' -H 'Content-Type: application/json' \
                     -d "{
                       \"apiVersion\": \"v1\",
                       \"kind\": \"Secret\",
                       \"metadata\": { \"name\": \"urfu-minio-env-config\" },
                       \"type\": \"Opaque\",
                       \"data\": {
                         \"config.env\": \"$CONFIG_ENV_B64\"
                       }
                     }"
              fi

              wait_for_vault

              LOGIN_RESPONSE="$(vault write -format=json auth/kubernetes/login role=minio-bootstrap jwt="$(cat ${SERVICEACCOUNT}/token)")"
              VAULT_TOKEN="$(json_get_string "$LOGIN_RESPONSE" client_token)"

              if [ -z "$VAULT_TOKEN" ]; then
                echo "Could not log in to Vault using Kubernetes auth."
                exit 1
              fi

              export VAULT_TOKEN

              vault kv put kv/urfu-link/prod/minio \
                  endpoint="https://urfu-minio-hl.urfu-platform.svc.cluster.local:9000" \
                  access_key="$MINIO_ROOT_USER" \
                  secret_key="$MINIO_ROOT_PASSWORD"

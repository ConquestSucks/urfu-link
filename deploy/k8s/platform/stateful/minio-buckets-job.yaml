apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap-buckets
  namespace: urfu-platform
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-02-15T10-36-16Z
          command:
            - /bin/sh
            - -c
            - >-
              mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" &&
              mc mb -p minio/media-private || true &&
              mc mb -p minio/media-public || true &&
              mc anonymous set download minio/media-public
          env:
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: minio-bootstrap-secret
                  key: endpoint
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-bootstrap-secret
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-bootstrap-secret
                  key: secret_key
